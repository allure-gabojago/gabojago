<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가보자고 V3.0 | 개발자-투자자 매칭 플랫폼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Montserrat:wght@900&display=swap');
        :root { --primary-gold: #facc15; --bg-black: #010101; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-black); color: #fff; margin: 0; scroll-behavior: smooth; }
        .text-gradient { background: linear-gradient(to right, #facc15, #f472b6, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .neon-border-card { background: rgba(255, 255, 255, 0.03); border-radius: 2rem; border: 1px solid rgba(255, 255, 255, 0.08); transition: 0.4s; overflow: hidden; }
        .neon-border-card:hover { border-color: var(--primary-gold); box-shadow: 0 0 30px rgba(250, 204, 21, 0.15); transform: translateY(-5px); }
        .input-dark { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 1rem; color: white; width: 100%; outline: none; }
        .input-dark:focus { border-color: var(--primary-gold); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body onload="initAll()">
    
    <nav class="p-8 flex justify-between items-center max-w-[1600px] mx-auto">
        <h1 class="text-4xl font-black italic text-gradient cursor-pointer" onclick="location.reload()">가보자고.</h1>
        <div class="flex gap-8 items-center">
            <a href="#register-section" class="text-white/60 hover:text-white font-bold transition">프로젝트 등록</a>
            <button class="bg-white text-black px-8 py-3 rounded-xl font-black hover:bg-yellow-400 transition shadow-lg">프리미엄 채널</button>
        </div>
    </nav>

    <!-- [1] 상단: 프로젝트 등록 섹션 (개발자용) -->
    <section id="register-section" class="max-w-[1600px] mx-auto px-8 py-10">
        <div class="neon-border-card p-12 bg-gradient-to-b from-white/5 to-transparent">
            <div class="mb-10 text-center">
                <h2 class="text-5xl font-black mb-4 italic italic">PROJECT SUBMISSION</h2>
                <p class="text-white/40 text-xl">개발자님의 혁신적인 사업계획과 특허 기술을 등록하세요.</p>
            </div>
            
            <div class="grid lg:grid-cols-2 gap-12">
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-white/30 mb-2 uppercase tracking-widest">프로젝트 명</label>
                        <input type="text" id="reg-title" class="input-dark text-xl" placeholder="예: 차세대 보안 양자 엔진">
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-white/30 mb-2 uppercase tracking-widest">기술 카테고리</label>
                            <select id="reg-category" class="input-dark">
                                <option value="보안">사이버 보안</option>
                                <option value="AI">인공지능</option>
                                <option value="바이오">바이오 테크</option>
                                <option value="우주">우주/통신</option>
                                <option value="에너지">그린 에너지</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-white/30 mb-2 uppercase tracking-widest">특허 보유 여부</label>
                            <select id="reg-patent" class="input-dark">
                                <option value="보유">특허 보유(등록 완료)</option>
                                <option value="출원">특허 출원 중</option>
                                <option value="없음">해당 없음</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-white/30 mb-2 uppercase tracking-widest">이미지 URL</label>
                        <input type="text" id="reg-img" class="input-dark" placeholder="https://images.unsplash.com/...">
                    </div>
                </div>
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-white/30 mb-2 uppercase tracking-widest">사업 계획 및 상세 설명</label>
                        <textarea id="reg-desc" class="input-dark h-[220px]" placeholder="핵심 기술력과 시장성을 자유롭게 서술해 주세요."></textarea>
                    </div>
                    <button onclick="registerProject()" class="w-full py-5 bg-gradient-to-r from-yellow-400 to-orange-500 text-black font-black text-2xl rounded-2xl hover:scale-[1.02] transition shadow-[0_10px_40px_rgba(24acc15,0.3)]">
                        프로젝트 플랫폼 등록하기
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- [2] 중간: 검색 및 필터 (투자자용) -->
    <section class="max-w-[1600px] mx-auto px-8 py-10">
        <div class="flex flex-col md:flex-row justify-between items-end gap-6">
            <div>
                <h3 class="text-4xl font-black mb-2 italic">MARKET EXPLORER</h3>
                <p class="text-white/40">실시간으로 등록된 12대 핵심 업종 기술 매칭</p>
            </div>
            <div class="flex w-full md:w-auto gap-4">
                <input type="text" id="search-bar" onkeyup="filterProjects()" class="input-dark w-full md:w-[400px]" placeholder="기술명, 특허, 키워드 검색...">
            </div>
        </div>
        <div class="h-[1px] bg-white/10 my-10"></div>

        <!-- 프로젝트 그리드 -->
        <div id="project-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
            <!-- 동적 삽입 -->
        </div>
    </section>

    <!-- [3] 하단: 상세 모달 -->
    <div id="project-modal" class="hidden fixed inset-0 z-[1000] flex items-center justify-center p-6 bg-black/95 backdrop-blur-xl">
        <div class="neon-border-card w-full max-w-6xl max-h-[90vh] overflow-y-auto p-12 relative bg-black">
            <button onclick="closeModal()" class="absolute top-8 right-10 text-5xl font-thin text-white/30 hover:text-white">&times;</button>
            <div id="modal-content" class="grid lg:grid-cols-2 gap-16"></div>
        </div>
    </div>

    <script>
        // 초기 데이터 (데이터베이스 역할)
        let projects = [
            { id: 1, title: "양자 암호 보안 모듈", cat: "보안", patent: "보유", desc: "국가급 기밀 유지를 위한 퀀트 암호 기술입니다.", img: "https://images.unsplash.com/photo-1639322537228-f710d846310a?auto=format&fit=crop&q=80&w=1000", author: "DevAlpha" },
            { id: 2, title: "차세대 AI 진단 도구", cat: "바이오", patent: "출원", desc: "딥러닝 기반 조기 암 진단 솔루션입니다.", img: "https://images.unsplash.com/photo-1576086213369-97a306d36557?auto=format&fit=crop&q=80&w=1000", author: "BioLink" }
        ];

        function initAll() { renderProjects(projects); }

        // 프로젝트 등록 함수
        function registerProject() {
            const title = document.getElementById('reg-title').value;
            const cat = document.getElementById('reg-category').value;
            const patent = document.getElementById('reg-patent').value;
            const desc = document.getElementById('reg-desc').value;
            const img = document.getElementById('reg-img').value || "https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&q=80&w=1000";

            if(!title || !desc) return alert("프로젝트 제목과 설명을 입력해 주세요.");

            const newProj = { id: Date.now(), title, cat, patent, desc, img, author: "NewDeveloper" };
            projects.unshift(newProj); // 리스트 맨 앞에 추가
            
            confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
            alert("프로젝트가 프리미엄 채널에 성공적으로 등록되었습니다!");
            
            // 입력창 초기화 및 리렌더링
            document.getElementById('reg-title').value = "";
            document.getElementById('reg-desc').value = "";
            renderProjects(projects);
            window.scrollTo(0, document.getElementById('project-grid').offsetTop - 100);
        }

        // 검색 필터 함수
        function filterProjects() {
            const keyword = document.getElementById('search-bar').value.toLowerCase();
            const filtered = projects.filter(p => 
                p.title.toLowerCase().includes(keyword) || 
                p.desc.toLowerCase().includes(keyword) ||
                p.cat.toLowerCase().includes(keyword)
            );
            renderProjects(filtered);
        }

        // 화면 렌더링
        function renderProjects(data) {
            const grid = document.getElementById('project-grid');
            grid.innerHTML = data.map(p => `
                <div onclick="openModal(${p.id})" class="neon-border-card flex flex-col cursor-pointer group">
                    <div class="h-48 overflow-hidden">
                        <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                    </div>
                    <div class="p-8">
                        <div class="flex justify-between items-start mb-4">
                            <span class="px-3 py-1 bg-white/10 rounded text-[10px] font-black text-yellow-400 uppercase tracking-tighter">${p.cat}</span>
                            <span class="text-[10px] text-white/30 font-bold italic">${p.patent}</span>
                        </div>
                        <h4 class="text-2xl font-black mb-4 group-hover:text-yellow-400 transition">${p.title}</h4>
                        <p class="text-white/40 text-sm line-clamp-2 mb-6">${p.desc}</p>
                        <div class="flex justify-between items-center pt-6 border-t border-white/5 text-[11px] font-bold">
                            <span class="text-white/20">WRITER: ${p.author}</span>
                            <span class="text-blue-400">DETAIL VIEW &rarr;</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            const p = projects.find(x => x.id === id);
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <div>
                    <img src="${p.img}" class="w-full rounded-3xl mb-8 shadow-2xl">
                    <div class="flex gap-4 mb-6">
                        <span class="px-4 py-2 bg-yellow-400 text-black font-black rounded-lg">업종: ${p.cat}</span>
                        <span class="px-4 py-2 bg-blue-600 text-white font-black rounded-lg">특허: ${p.patent}</span>
                    </div>
                </div>
                <div class="flex flex-col justify-between">
                    <div>
                        <h2 class="text-6xl font-black mb-8 italic tracking-tighter">${p.title}</h2>
                        <p class="text-2xl text-white/60 leading-relaxed mb-12">${p.desc}</p>
                        <div class="p-8 bg-white/5 rounded-3xl border border-white/10 mb-12">
                            <p class="text-sm text-white/30 uppercase mb-2 font-bold">Investor Matching Status</p>
                            <p class="text-2xl font-black text-green-400">● 투자 매칭 가능 (Premium)</p>
                        </div>
                    </div>
                    <button onclick="requestMatch()" class="w-full py-6 bg-white text-black font-black text-3xl rounded-2xl hover:bg-yellow-400 transition shadow-2xl">투자 매칭 신청하기</button>
                </div>
            `;
            document.getElementById('project-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('project-modal').classList.add('hidden'); }
        function requestMatch() {
            alert('투자 매칭 요청이 전송되었습니다. 관리자가 개발자님께 연락드릴 예정입니다.');
            closeModal();
        }
    </script>
</body>
</html>
