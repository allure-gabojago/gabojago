<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가보자고 | Gabojago Ultra V3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; transition: background-color 0.5s ease; overflow-x: hidden; margin: 0; }
        
        /* 다크모드/라이트모드 스타일 */
        body.dark { background-color: #000; color: #fff; }
        body.light { background-color: #f4f4f5; color: #111; }
        
        .hero-font { font-family: 'Black Han Sans', sans-serif; }
        .gradient-text { background: linear-gradient(90deg, #facc15, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* 유리창 효과 카드 */
        .glass-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(250, 204, 21, 0.2); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .light .glass-card {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(250, 204, 21, 0.5);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
        }

        /* 배경 캔버스 */
        #particle-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
    </style>
</head>
<body class="dark" onload="initAll()">
    <canvas id="particle-canvas"></canvas>

    <nav class="p-6 flex justify-between items-center border-b border-gray-800 sticky top-0 z-50 bg-black/50 backdrop-blur-md">
        <h1 class="text-3xl font-bold tracking-tighter text-yellow-400">GABOJAGO</h1>
        <div class="flex items-center gap-4">
            <button onclick="toggleTheme()" class="px-4 py-2 rounded-full border border-yellow-400 text-xs font-bold hover:bg-yellow-400 hover:text-black transition-all">THEME SWITCH</button>
            <span class="hidden md:block text-xs text-yellow-500 animate-pulse font-mono">CORE_ENGINE_V3.0_ONLINE</span>
        </div>
    </nav>

    <main class="flex-grow px-4 py-8 max-w-7xl mx-auto w-full relative">
        <div id="welcome-msg" class="space-y-6 text-center py-24">
            <h2 class="hero-font text-6xl md:text-9xl mb-6 leading-tight">
                돈이 사람을 고르는<br/>
                시대는<br/>
                <span class="gradient-text">끝났다.</span>
            </h2>
            <button onclick="activateDisplay()" class="px-12 py-5 bg-yellow-400 text-black font-extrabold rounded-full hover:bg-yellow-300 animate-bounce shadow-[0_0_30px_rgba(250,204,21,0.6)] text-2xl transition-all">내 가치 엔진 가동 ▲</button>
        </div>

        <div id="user-profile" class="hidden grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-6">
                <div class="glass-card p-6 rounded-3xl text-center">
                    <div class="mb-4 flex justify-center">
                        <div class="w-20 h-20 rounded-full border-2 border-yellow-400 flex items-center justify-center text-2xl font-bold text-yellow-400">ALLURE</div>
                    </div>
                    <h2 class="hero-font text-2xl text-yellow-400">ALLURE님</h2>
                    <p class="text-[10px] text-gray-500 mb-4 tracking-widest">WORLD TOP 1% VALUE MODEL</p>
                    <div class="space-y-3" id="ranking-list"></div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="glass-card p-8 rounded-3xl h-full flex flex-col relative overflow-hidden">
                    <p class="text-gray-400 text-sm mb-1 uppercase tracking-widest">Real-time Value Asset</p>
                    <h3 class="text-5xl md:text-7xl font-bold mb-6 tracking-tighter">₩ <span id="value-counter">0</span></h3>
                    <div class="flex-grow min-h-[300px]"><canvas id="valueChart"></canvas></div>
                </div>
            </div>

            <div class="lg:col-span-1 space-y-6">
                <div class="glass-card p-6 rounded-3xl h-full flex flex-col">
                    <h3 class="hero-font text-xl text-yellow-400 mb-4 text-center">AI 가치 리포트</h3>
                    <div class="flex-grow"><canvas id="radarChart"></canvas></div>
                    <div class="mt-6 p-4 bg-yellow-400/10 rounded-2xl border border-yellow-400/20">
                        <p class="text-[10px] text-yellow-500 font-bold uppercase mb-1">System Verdict</p>
                        <p class="text-xs leading-relaxed text-gray-300" id="ai-text">"폭발적인 가치 상승 곡선을 그리며 새로운 시대의 리더로 부상하고 있습니다."</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let myChart, radarChart, canvas, ctx, particles = [];

        function initAll() {
            initParticles();
            window.addEventListener('resize', initParticles);
        }

        // 파티클 엔진 (Star Dust 효과)
        function initParticles() {
            canvas = document.getElementById('particle-canvas');
            ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5 + 0.2
                });
            }
            animateParticles();
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = document.body.classList.contains('dark') ? 'rgba(250, 204, 21, 0.5)' : 'rgba(0, 0, 0, 0.1)';
            particles.forEach(p => {
                p.y -= p.speed;
                if(p.y < 0) p.y = canvas.height;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animateParticles);
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            document.body.classList.toggle('light');
        }

        function activateDisplay() {
            document.getElementById('welcome-msg').style.display = 'none';
            document.getElementById('user-profile').style.display = 'grid';
            startCounter(1096784219);
            initCharts();
            generateRanking();
        }

        function generateRanking() {
            const list = document.getElementById('ranking-list');
            const names = ["Elon M.", "Vitalik B.", "Jensen H.", "Sam A."];
            list.innerHTML = names.map((n, i) => `
                <div class="flex justify-between p-2 rounded-lg bg-white/5 border border-white/5 items-center">
                    <span class="text-[10px] font-bold text-yellow-500">#${i+1}</span>
                    <span class="text-[10px]">${n}</span>
                    <span class="text-[9px] text-gray-500">₩${(1.8-i*0.3).toFixed(1)}B</span>
                </div>
            `).join('');
        }

        function startCounter(target) {
            let count = 0;
            const timer = setInterval(() => {
                count += target/50;
                if(count >= target) { document.getElementById('value-counter').innerText = target.toLocaleString(); clearInterval(timer); }
                else { document.getElementById('value-counter').innerText = Math.floor(count).toLocaleString(); }
            }, 30);
        }

        function initCharts() {
            const ctx1 = document.getElementById('valueChart').getContext('2d');
            myChart = new Chart(ctx1, {
                type: 'line',
                data: { labels: ['1h', '40m', '20m', 'Now'], datasets: [{ data: [65, 85, 80, 100], borderColor: '#facc15', borderWidth: 5, tension: 0.4, fill: true, backgroundColor: 'rgba(250, 204, 21, 0.1)', pointRadius: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
            });

            const ctx2 = document.getElementById('radarChart').getContext('2d');
            radarChart = new Chart(ctx2, {
                type: 'radar',
                data: {
                    labels: ['창의력', '열정', '실행력', '전문성', '소통'],
                    datasets: [{
                        data: [95, 90, 85, 75, 80],
                        backgroundColor: 'rgba(250, 204, 21, 0.3)',
                        borderColor: '#facc15',
                        pointRadius: 2
                    }]
                },
                options: { 
                    scales: { r: { grid: { color: '#333' }, pointLabels: { color: '#888', font: { size: 10 } }, ticks: { display: false }, suggestedMin: 0 } },
                    plugins: { legend: { display: false } }
                }
            });
        }
    </script>
</body>
</html>
