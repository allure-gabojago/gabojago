<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GABOJAGO | 글로벌 실시간 투자 거래소</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;600;700&family=Montserrat:wght@800;900&display=swap');
        
        :root { --primary-gold: #facc15; --bg-black: #000; }
        
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--bg-black); color: #fff; margin: 0; 
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            word-break: keep-all;
        }

        .hero-font { font-family: 'Montserrat', sans-serif; font-weight: 900; }
        .korean-font { font-family: 'Black Han Sans', sans-serif; }

        /* [로고 정밀 보정] 영어와 한글의 시각적 크기/두께 밸런스 */
        .logo-group { display: flex; align-items: center; gap: 1.8rem; }
        .logo-symbol {
            background-color: var(--primary-gold);
            width: 52px; height: 52px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 14px;
            box-shadow: 0 0 25px rgba(250, 204, 21, 0.3);
        }
        .logo-symbol span { color: #000; font-size: 2rem; font-weight: 900; transform: skewX(-5deg); }
        
        .brand-name-eng { font-size: 2.1rem; letter-spacing: -0.05em; font-weight: 900; color: #fff; }
        .brand-name-kor { 
            font-family: 'Noto Sans KR', sans-serif; 
            font-size: 1.8rem; /* 영문보다 살짝 작게 조절하여 시각적 균형 확보 */
            font-weight: 300; /* 한글은 얇게 설정해야 뭉개지지 않고 깔끔함 */
            color: var(--primary-gold);
            margin-left: 0.8rem;
            letter-spacing: -0.05em;
        }

        /* [가독성] 엔진 가동 및 본문 글자 뭉개짐 방지 (Weight 500~600) */
        .txt-sharp-light { font-weight: 500; letter-spacing: -0.02em; line-height: 1.6; color: #ccc; }
        .txt-sharp-bold { font-weight: 600; letter-spacing: -0.015em; line-height: 1.4; }

        .glass-card { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(40px); 
            border: 1px solid rgba(250, 204, 21, 0.12); 
            transition: all 0.4s ease;
        }
        
        .btn-invest-dual { 
            display: flex; justify-content: center; align-items: center; 
            gap: 1.5rem; width: 100%; padding: 1.6rem 1rem;
            background-color: #fff; color: #000; border-radius: 2.5rem;
            transition: all 0.3s ease; cursor: pointer;
        }
        .btn-invest-dual:hover { background-color: var(--primary-gold); transform: translateY(-5px); }
        .btn-kor { font-weight: 500; font-size: 1.6rem; letter-spacing: -0.03em; } /* 버튼 내 한글 최적화 */
        .btn-eng { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1.6rem; }

        #invest-modal {
            display: none; position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.96); align-items: center; justify-content: center;
            backdrop-filter: blur(25px);
        }
        #invest-modal.active { display: flex; }
        .input-gold {
            background: transparent; border-bottom: 2px solid var(--primary-gold);
            width: 80%; color: white; font-size: 2.5rem; font-weight: 700; text-align: center; outline: none; padding: 1rem;
        }

        #particle-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
    </style>
</head>
<body onload="initAll()">
    <canvas id="particle-canvas"></canvas>

    <nav class="p-8 flex justify-between items-center border-b border-white/5 sticky top-0 z-50 bg-black/90 backdrop-blur-md">
        <div class="logo-group">
            <div class="logo-symbol"><span>G</span></div>
            <div class="flex items-baseline">
                <span class="brand-name-eng hero-font">GABOJAGO</span>
                <span class="brand-name-kor">가보자고</span>
            </div>
        </div>
        <div class="flex items-center gap-8">
            <div class="text-right pr-8 border-r border-white/10">
                <p class="text-[0.5rem] font-bold text-gray-500 uppercase tracking-widest">My Asset</p>
                <p class="text-xl font-black text-white italic"><span id="my-wallet">500,000,000</span>원</p>
            </div>
            <button class="bg-yellow-400 text-black px-6 py-2 rounded-xl font-black text-xs">RECHARGE</button>
        </div>
    </nav>

    <main class="px-8 py-20 max-w-[1500px] mx-auto">
        <div class="mb-20">
            <p class="text-yellow-400 font-bold tracking-[0.3em] text-xs uppercase mb-4">Market Engine Active</p>
            <h2 class="text-5xl font-bold italic tracking-tighter leading-tight txt-sharp-bold">
                엔진 가동 시작: <br/> <span class="text-white opacity-80 font-light">당신의 안목이 가치가 되는 순간</span>
            </h2>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <div class="glass-card p-12 rounded-[4rem] border border-white/5">
                <h4 class="text-3xl font-bold italic uppercase mb-6">AI Quant Engine <br><span class="text-white/20 font-light text-2xl">| 인공지능 퀀트 엔진</span></h4>
                <div class="btn-invest-dual" onclick="openInvestModal('인공지능 퀀트 엔진')">
                    <span class="btn-eng">INVEST NOW</span>
                    <span class="opacity-10 text-3xl">|</span>
                    <span class="btn-kor">투자하기</span>
                </div>
            </div>
            <div class="glass-card p-12 rounded-[4rem] border border-white/5">
                <h4 class="text-3xl font-bold italic uppercase mb-6">Space Logistics <br><span class="text-white/20 font-light text-2xl">| 우주 물류 시스템</span></h4>
                <div class="btn-invest-dual" onclick="openInvestModal('우주 물류 시스템')">
                    <span class="btn-eng">INVEST NOW</span>
                    <span class="opacity-10 text-3xl">|</span>
                    <span class="btn-kor">투자하기</span>
                </div>
            </div>
        </div>
    </main>

    <div id="invest-modal">
        <div class="max-w-xl w-full p-10 text-center">
            <h2 id="modal-project-name" class="text-3xl font-black italic mb-10 text-yellow-400">PROJECT</h2>
            <input type="text" id="invest-input" class="input-gold" placeholder="0" oninput="formatInput(this)">
            <div class="flex gap-4 mt-12">
                <button onclick="closeInvestModal()" class="flex-1 py-5 bg-white/10 rounded-2xl text-gray-400">취소</button>
                <button onclick="processInvestment()" class="flex-[2] py-5 bg-yellow-400 text-black rounded-2xl font-black text-xl">투자 확정</button>
            </div>
        </div>
    </div>

    <script>
        let myBalance = 500000000;
        function initAll() { initParticles(); updateWalletUI(); }
        function updateWalletUI() { document.getElementById('my-wallet').innerText = myBalance.toLocaleString(); }
        function formatInput(el) {
            let val = el.value.replace(/[^0-9]/g, '');
            if (val === "") { el.value = ""; return; }
            el.value = Number(val).toLocaleString() + " 원";
        }
        function openInvestModal(name) {
            document.getElementById('modal-project-name').innerText = name;
            document.getElementById('invest-input').value = "10,000,000 원";
            document.getElementById('invest-modal').classList.add('active');
        }
        function closeInvestModal() { document.getElementById('invest-modal').classList.remove('active'); }
        function processInvestment() {
            const rawValue = document.getElementById('invest-input').value.replace(/[^-0-9]/g, '');
            const amount = parseInt(rawValue);
            if (amount > myBalance) { alert('잔액 부족'); return; }
            myBalance -= amount; updateWalletUI();
            alert(`성공적으로 투자되었습니다.`);
            closeInvestModal();
        }
        function initParticles() {
            const canvas = document.getElementById('particle-canvas'); const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let p = Array.from({length: 45}, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, s: Math.random() * 1.5, v: Math.random() * 0.15 }));
            function draw() { ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = 'rgba(250,204,21,0.2)'; p.forEach(i => { i.y -= i.v; if(i.y < 0) i.y = canvas.height; ctx.beginPath(); ctx.arc(i.x, i.y, i.s, 0, Math.PI*2); ctx.fill(); }); requestAnimationFrame(draw); }
            draw();
        }
    </script>
</body>
</html>
