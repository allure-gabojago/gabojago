<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가보자고 | 프리미엄 투자 엔진</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght=100;300;400;500;700;900&family=Montserrat:wght=900&display=swap');
        
        :root { 
            --primary-gold: #facc15; 
            --neon-purple: #a855f7;
            --neon-blue: #3b82f6;
            --bg-black: #030303; 
        }

        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--bg-black); 
            color: #fff; 
            margin: 0; 
            overflow-x: hidden;
            /* 배경에 은은한 오로라 효과 추가 */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 40%);
        }

        /* [혁신] 네온 흐르는 보더 효과 */
        .neon-border-card {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 2rem;
            transition: 0.5s;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .neon-border-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-gold);
            box-shadow: 0 0 30px rgba(250, 204, 21, 0.2);
        }

        /* 발광형 버튼 */
        .btn-glow {
            background: linear-gradient(45deg, #facc15, #fbbf24);
            color: #000;
            font-weight: 900;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(250, 204, 21, 0.3);
            transition: 0.3s;
        }

        .btn-glow:hover {
            box-shadow: 0 0 25px rgba(250, 204, 21, 0.6);
            transform: scale(1.05);
        }

        /* 텍스트 그라데이션 */
        .text-gradient {
            background: linear-gradient(to right, #facc15, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: #ff4d4d;
            box-shadow: 0 0 10px #ff4d4d;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-gold); }

        /* 커스텀 탭 가시성 스타일 */
        .form-content { display: none; }
        .form-content.active { display: block; }
    </style>
</head>
<body onload="initAll()">
    
    <!-- AI 매칭 바 (컬러 강화) -->
    <div class="bg-black/80 backdrop-blur-xl py-4 px-8 border-b border-white/10 sticky top-0 z-[200]">
        <div class="max-w-[1600px] mx-auto flex flex-wrap items-center justify-between gap-6">
            <div class="flex items-center gap-4">
                <span class="text-[10px] font-black bg-gradient-to-r from-purple-500 to-blue-500 text-white px-3 py-1 rounded-full animate-bounce">AI ENGINE ACTIVE</span>
                <p class="text-sm font-bold">나의 투자 성향: <span id="dna-label" class="text-gradient font-black text-lg ml-2">안정 지향형</span></p>
            </div>
            <div class="flex items-center gap-6 flex-1 max-w-md">
                <input type="range" id="dna-slider" min="0" max="100" value="20" class="w-full cursor-pointer" oninput="updateDNA(this.value)">
            </div>
        </div>
    </div>

    <nav class="p-8 flex justify-between items-center max-w-[1600px] mx-auto">
        <div class="brand-group cursor-pointer" onclick="showSection('main')">
            <h1 class="text-4xl font-black italic tracking-tighter hover:text-yellow-400 transition-colors">가보자고.</h1>
        </div>
        <div class="flex items-center gap-10">
            <div class="hidden md:flex gap-10 text-sm font-black tracking-widest text-white/40">
                <button onclick="showSection('main')" class="hover:text-white">PROJECTS</button>
                <button onclick="showSection('feed')" class="hover:text-white">LIVE PULSE</button>
                <button onclick="showSection('mypage')" class="hover:text-white">ASSETS</button>
            </div>
            <button onclick="showSection('auth')" class="btn-glow px-8 py-3 text-xs uppercase tracking-tighter">Enter Gate</button>
        </div>
    </nav>

    <!-- [1] 메인 프로젝트 섹션 -->
    <main id="main-section" class="px-8 py-12 max-w-[1600px] mx-auto">
        <header class="mb-20">
            <h2 class="text-7xl md:text-9xl font-black tracking-tighter mb-8 leading-none">
                FUTURE <br> <span class="text-gradient">IS YOURS.</span>
            </h2>
            <div class="flex flex-wrap gap-4">
                <div class="px-6 py-3 bg-white/5 rounded-full border border-white/10 font-bold text-sm"># 인공지능 매칭</div>
                <div class="px-6 py-3 bg-white/5 rounded-full border border-white/10 font-bold text-sm"># 엔젤 투자</div>
                <div class="px-6 py-3 bg-white/5 rounded-full border border-white/10 font-bold text-sm"># 퀀텀 점프</div>
            </div>
        </header>

        <div id="project-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- 프로젝트 카드가 동적으로 생성됩니다 -->
        </div>
    </main>

    <!-- [2] 실시간 동향 섹션 -->
    <section id="feed-section" class="hidden px-8 py-20 max-w-[1200px] mx-auto">
        <h2 class="text-5xl font-black mb-16 italic">LIVE <span class="text-blue-500">INSIGHT</span></h2>
        <div id="feed-list" class="grid gap-6"></div>
    </section>

    <!-- [3] 마이 자산 섹션 -->
    <section id="mypage-section" class="hidden px-8 py-20 max-w-[1400px] mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            <div class="bg-white/5 p-12 rounded-[3rem] border border-purple-500/30 relative overflow-hidden">
                <div class="absolute top-0 right-0 p-8 opacity-20 text-8xl font-black">VIP</div>
                <div class="relative z-10">
                    <p class="text-white/40 font-bold mb-2">PARTNER ID</p>
                    <h3 class="text-4xl font-black mb-10">김가보자</h3>
                    <div class="space-y-6">
                        <div class="flex justify-between"><span>멤버십 등급</span><span class="text-purple-400 font-black">PLATINUM</span></div>
                        <div class="flex justify-between"><span>누적 매칭 수</span><span class="font-black text-blue-400">12건</span></div>
                    </div>
                </div>
            </div>
            <div class="lg:col-span-2 bg-white/5 p-12 rounded-[3rem] bg-gradient-to-br from-blue-500/10 to-purple-500/10 border border-white/10">
                <p class="text-white/40 font-bold mb-4">TOTAL ASSET VALUE</p>
                <h2 class="text-8xl font-black mb-6 text-gradient italic">1,250,000,000 ₩</h2>
                <div class="h-4 bg-black/40 rounded-full overflow-hidden p-1">
                    <div class="h-full bg-gradient-to-r from-yellow-400 via-purple-500 to-blue-500 rounded-full shadow-[0_0_20px_rgba(168,85,247,0.5)]" style="width: 80%"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- [4] 로그인 섹션 -->
    <section id="auth-section" class="hidden min-h-[80vh] flex items-center justify-center">
        <div class="bg-white/5 p-16 rounded-[4rem] w-full max-w-[500px] border border-white/10 shadow-[0_0_50px_rgba(0,0,0,1)] text-center">
            <div class="mb-10 text-6xl">🔒</div>
            <h2 class="text-4xl font-black mb-10 tracking-tighter italic">ENCRYPTED GATE</h2>
            <div class="space-y-6">
                <input type="text" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-blue-500 transition-all text-center font-bold" placeholder="SECRET ID">
                <button class="btn-glow w-full py-5 text-lg">ACCESS NOW</button>
            </div>
        </div>
    </section>

    <!-- 상세 모달 (투자자 신청 및 개발자 등록 탭 기능이 완전히 포함된 프리미엄 모달) -->
    <div id="project-modal" class="hidden fixed inset-0 z-[1000] flex items-center justify-center p-4 bg-black/95 backdrop-blur-2xl">
        <div class="neon-border-card w-full max-w-4xl rounded-[4rem] p-12 relative border-yellow-400/30 bg-[#0a0a0a]">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-white/20 hover:text-white text-5xl font-thin">&times;</button>
            
            <div id="modal-project-info" class="mb-8">
                <!-- 프로젝트 헤더가 동적으로 들어갑니다 -->
            </div>

            <!-- 전환 가능한 프리미엄 매칭 탭 인터페이스 -->
            <div class="flex border-b border-white/10 mb-8">
                <button class="flex-1 py-4 text-center text-lg font-black tracking-wider text-yellow-400 border-b-2 border-yellow-400 transition-all" id="tab-invest" onclick="switchModalTab('invest')">
                    투자자 매칭 신청하기
                </button>
                <button class="flex-1 py-4 text-center text-lg font-black tracking-wider text-white/40 hover:text-white transition-all" id="tab-dev" onclick="switchModalTab('dev')">
                    개발자 제안 등록하기
                </button>
            </div>

            <!-- [폼 1] 투자자 매칭 신청 양식 -->
            <form id="form-invest-content" class="form-content active space-y-6" onsubmit="handleSubmit(event, '투자자 매칭 신청')">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-white/60 mb-2">투자자명 / 기관명</label>
                        <input type="text" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-yellow-400 text-white font-medium" placeholder="회사명 또는 성함을 입력하세요" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-white/60 mb-2">희망 투자 금액 (규모)</label>
                        <input type="text" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-yellow-400 text-white font-medium" placeholder="예: 최소 5,000만 원 ~ 최대 2억 원 범위" required>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-white/60 mb-2">투자 조건 및 검토 요약</label>
                    <textarea class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-yellow-400 text-white font-medium h-28 resize-none" placeholder="선호하는 팀 구성이나 필수 요건을 자유롭게 작성해 주세요."></textarea>
                </div>
                <button type="submit" class="btn-glow w-full py-5 text-xl">심사 확정 및 계약 진행</button>
            </form>

            <!-- [폼 2] 개발자 제안 등록 양식 (요청하신 수정사항 완벽 반영!) -->
            <form id="form-dev-content" class="form-content space-y-6" onsubmit="handleSubmit(event, '개발자 제안 등록')">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-white/60 mb-2">프로젝트명 / 팀명</label>
                        <input type="text" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-purple-500 text-white font-medium" placeholder="프로젝트 이름 또는 팀명을 입력하세요" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-white/60 mb-2">필요 자금 조달 규모</label>
                        <input type="text" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-purple-500 text-white font-medium" placeholder="예: 시제품 제작을 위한 3,000만 원 조달 필요" required>
                    </div>
                </div>
                <div>
                    <!-- 수정 완료: 빌드업 요구 -> 서비스 출시 목적 원천 변경 -->
                    <label class="block text-sm font-bold text-white/60 mb-2">프로젝트 기간 또는 핵심 개발 타겟</label>
                    <input type="text" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-purple-500 text-white font-medium" placeholder="예: 6개월 이내 상용화 / 서비스 출시 목적" required>
                </div>
                <div>
                    <!-- 수정 완료: GABOJA 파트너스 검증단 핵심 문구 완벽 적용 -->
                    <label class="block text-sm font-bold text-white/60 mb-2">상세 비즈니스 핵심 내용</label>
                    <textarea class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-purple-500 text-white font-medium h-28 resize-none" placeholder="GABOJA 파트너스 검증단과 투자자에게 전달될 핵심 기획 요약을 작성하세요." required></textarea>
                </div>
                <button type="submit" class="w-full py-5 text-xl font-black bg-gradient-to-r from-purple-500 to-blue-500 text-white rounded-xl shadow-lg hover:opacity-90 transform hover:scale-[1.01] transition-all">제안서 검증단에 등록하기</button>
            </form>
        </div>
    </div>

    <script>
        const projectData = [
            { id: 1, name: "안전 보안 사이버", sub: "QUANTUM DEFENSE", yield: 32.5, viewers: 8, dna: 10, color: "#a855f7" },
            { id: 2, name: "인공지능 퀀트", sub: "HFT ALGORITHM", yield: 28.1, viewers: 15, dna: 85, color: "#3b82f6" },
            { id: 3, name: "K-컬처 콘텐츠 AI", sub: "GEN-MEDIA IP", yield: 31.2, viewers: 24, dna: 60, color: "#facc15" },
            { id: 4, name: "우주 항공 위성", sub: "STAR-LINK X", yield: 15.4, viewers: 3, dna: 95, color: "#ec4899" },
            { id: 5, name: "자율주행 모빌리티", sub: "LIDAR AUTO-PILOT", yield: 25.7, viewers: 12, dna: 75, color: "#10b981" },
            { id: 6, name: "차세대 배터리", sub: "SOLID-STATE BATT", yield: 27.3, viewers: 19, dna: 40, color: "#f97316" }
        ];

        function initAll() {
            renderProjects();
            renderFeed();
        }

        function updateDNA(val) {
            const label = document.getElementById('dna-label');
            if(val < 30) label.innerText = "안정 지향형";
            else if(val < 70) label.innerText = "성장 밸런스형";
            else label.innerText = "고수익 모험형";
            renderProjects(val);
        }

        function renderProjects(dnaFilter = 20) {
            const container = document.getElementById('project-grid');
            container.innerHTML = projectData.map(p => {
                const matchScore = 100 - Math.abs(p.dna - dnaFilter);
                return `
                <div onclick="openModal(${p.id})" class="neon-border-card p-10 h-[450px] flex flex-col justify-between cursor-pointer group">
                    <div class="absolute -right-10 -top-10 w-40 h-40 rounded-full blur-[60px] opacity-20" style="background: ${p.color}"></div>
                    <div>
                        <div class="flex justify-between items-start mb-10">
                            <span class="text-[10px] font-black px-3 py-1 bg-white/10 rounded-full border border-white/10">MATCH ${matchScore}%</span>
                            <div class="flex items-center text-[10px] font-black text-red-500">
                                <div class="live-dot"></div> <span class="ml-2">${p.viewers} LIVE</span>
                            </div>
                        </div>
                        <h4 class="text-4xl font-black mb-4 group-hover:text-gradient transition-all leading-tight">${p.name}</h4>
                        <p class="text-sm font-bold opacity-40 uppercase tracking-widest">${p.sub}</p>
                    </div>
                    <div>
                        <div class="mb-8">
                            <p class="text-[10px] font-black text-white/30 mb-2">TARGET YIELD</p>
                            <p class="text-5xl font-black" style="color: ${p.color}">+${p.yield}%</p>
                        </div>
                        <div class="h-1 w-full bg-white/5 rounded-full overflow-hidden">
                            <div class="h-full transition-all duration-1000" style="width: ${matchScore}%; background: ${p.color}"></div>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function renderFeed() {
            const feedList = document.getElementById('feed-list');
            const feeds = [
                "익명의 고액 투자자가 [안공지능 퀀트] 프로젝트를 최종 심사 중입니다.",
                "[차세대 배터리] 팀이 실리콘밸리 벤처캐피탈과 미팅을 성공적으로 마쳤습니다.",
                "당신의 DNA 분석 결과 [K-컬처 AI] 프로젝트와 98% 일치합니다."
            ];
            feedList.innerHTML = feeds.map(f => `
                <div class="bg-white/5 p-8 rounded-[2rem] border-l-8 border-purple-500 flex items-center gap-6 group hover:bg-white/10">
                    <div class="text-3xl group-hover:animate-pulse">🔥</div>
                    <p class="text-xl font-bold italic text-white/80">${f}</p>
                </div>
            `).join('');
        }

        function openModal(id) {
            const p = projectData.find(x => x.id === id);
            const infoContainer = document.getElementById('modal-project-info');
            
            infoContainer.innerHTML = `
                <div class="flex justify-between items-start mb-4">
                    <span class="text-xs font-black uppercase tracking-[0.5em]" style="color: ${p.color}">Verified Engine Match</span>
                    <span class="text-2xl font-black" style="color: ${p.color}">기대수익률 +${p.yield}%</span>
                </div>
                <h2 class="text-5xl font-black mb-4 leading-none">${p.name}</h2>
                <p class="text-lg text-white/60 font-medium">${p.name} 플랫폼 내 비즈니스 검증 완료. 현재 ${p.viewers}명의 전문 파트너가 실시간 딜 검토를 동시 진행 중입니다.</p>
            `;
            
            // 모달 오픈 시 첫 번째 탭(투자자 신청)으로 기본 초기화
            switchModalTab('invest');
            document.getElementById('project-modal').classList.remove('hidden');
        }

        function switchModalTab(tabType) {
            const tabInvest = document.getElementById('tab-invest');
            const tabDev = document.getElementById('tab-dev');
            const formInvest = document.getElementById('form-invest-content');
            const formDev = document.getElementById('form-dev-content');

            if (tabType === 'invest') {
                tabInvest.className = "flex-1 py-4 text-center text-lg font-black tracking-wider text-yellow-400 border-b-2 border-yellow-400 transition-all";
                tabDev.className = "flex-1 py-4 text-center text-lg font-black tracking-wider text-white/40 hover:text-white transition-all";
                formInvest.classList.add('active');
                formDev.classList.remove('active');
            } else {
                tabDev.className = "flex-1 py-4 text-center text-lg font-black tracking-wider text-purple-400 border-b-2 border-purple-400 transition-all";
                tabInvest.className = "flex-1 py-4 text-center text-lg font-black tracking-wider text-white/40 hover:text-white transition-all";
                formDev.classList.add('active');
                formInvest.classList.remove('active');
            }
        }

        function showSection(id) {
            ['main', 'feed', 'mypage', 'auth'].forEach(s => document.getElementById(s + '-section').classList.add('hidden'));
            document.getElementById(id + '-section').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function closeModal() { document.getElementById('project-modal').classList.add('hidden'); }
        
        function handleSubmit(event, typeName) {
            event.preventDefault();
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 }, colors: ['#facc15', '#a855f7', '#3b82f6'] });
            alert(`[GABOJA 파트너스] ${typeName} 절차가 정상적으로 접수되었습니다. 검증단 심사 후 영업일 기준 3일 이내에 홈페이지 업로드 및 매칭 브리핑이 진행됩니다.`);
            closeModal();
            event.target.reset();
        }
    </script>
</body>
</html>
