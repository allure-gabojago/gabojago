<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가보자고 V3.1 | 최적화된 매칭 플랫폼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Montserrat:wght@900&display=swap');
        :root { --primary-gold: #facc15; --bg-black: #010101; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-black); color: #fff; margin: 0; overflow-x: hidden; }
        .text-gradient { background: linear-gradient(to right, #facc15, #f472b6, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* 카드 디자인 유지 */
        .neon-border-card { background: rgba(255, 255, 255, 0.03); border-radius: 2rem; border: 1px solid rgba(255, 255, 255, 0.08); transition: 0.4s; overflow: hidden; }
        .neon-border-card:hover { border-color: var(--primary-gold); box-shadow: 0 0 30px rgba(250, 204, 21, 0.15); transform: translateY(-5px); }
        
        .input-dark { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 1rem; color: white; width: 100%; outline: none; }
        
        /* 모달 크기 최적화 스크립트 대응 스타일 */
        .modal-scroll-area { 
            max-height: 70vh; /* 화면 높이의 70%로 제한 */
            overflow-y: auto; 
            padding-right: 10px;
        }
        .modal-scroll-area::-webkit-scrollbar { width: 6px; }
        .modal-scroll-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        /* 애니메이션 */
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-modal { animation: modalFadeIn 0.3s ease-out; }
    </style>
</head>
<body onload="initAll()">
    
    <nav class="p-8 flex justify-between items-center max-w-[1600px] mx-auto">
        <h1 class="text-4xl font-black italic text-gradient cursor-pointer" onclick="location.reload()">가보자고.</h1>
        <div class="flex gap-8 items-center text-sm font-bold">
            <a href="#register-section" class="text-white/40 hover:text-white transition">프로젝트 등록</a>
            <button class="bg-white text-black px-6 py-2 rounded-xl font-black hover:bg-yellow-400 transition">프리미엄 채널</button>
        </div>
    </nav>

    <!-- [1] 등록 섹션: 높이 조절 -->
    <section id="register-section" class="max-w-[1600px] mx-auto px-8 py-6">
        <div class="neon-border-card p-10 bg-gradient-to-b from-white/5 to-transparent">
            <h2 class="text-3xl font-black mb-8 italic">PROJECT SUBMISSION</h2>
            <div class="grid lg:grid-cols-2 gap-10">
                <div class="space-y-4">
                    <input type="text" id="reg-title" class="input-dark" placeholder="프로젝트 명">
                    <div class="grid grid-cols-2 gap-4">
                        <select id="reg-category" class="input-dark">
                            <option value="보안">사이버 보안</option>
                            <option value="AI">인공지능</option>
                            <option value="바이오">바이오 테크</option>
                        </select>
                        <select id="reg-patent" class="input-dark">
                            <option value="보유">특허 보유</option>
                            <option value="출원">출원 중</option>
                        </select>
                    </div>
                    <input type="text" id="reg-img" class="input-dark" placeholder="이미지 URL">
                </div>
                <div class="space-y-4">
                    <textarea id="reg-desc" class="input-dark h-[120px]" placeholder="상세 설명을 입력하세요."></textarea>
                    <button onclick="registerProject()" class="w-full py-4 bg-yellow-400 text-black font-black text-xl rounded-xl hover:scale-105 transition">등록하기</button>
                </div>
            </div>
        </div>
    </section>

    <!-- [2] 리스트 섹션 -->
    <section class="max-w-[1600px] mx-auto px-8 py-10">
        <div class="flex justify-between items-end mb-10">
            <h3 class="text-3xl font-black italic">MARKET EXPLORER</h3>
            <input type="text" id="search-bar" onkeyup="filterProjects()" class="input-dark w-[300px]" placeholder="검색어를 입력하세요...">
        </div>
        <div id="project-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </section>

    <!-- [3] 모달: PC 화면 비율 최적화 (넘치지 않게 설정) -->
    <div id="project-modal" class="hidden fixed inset-0 z-[1000] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="neon-border-card w-full max-w-5xl bg-black border-white/20 relative animate-modal overflow-hidden">
            <!-- 닫기 버튼 -->
            <button onclick="closeModal()" class="absolute top-6 right-8 text-4xl font-thin text-white/50 hover:text-white z-10">&times;</button>
            
            <div id="modal-content" class="grid lg:grid-cols-2 h-full max-h-[85vh]">
                <!-- 좌측: 이미지 (PC에서 고정 비율) -->
                <div id="modal-img-container" class="h-64 lg:h-full bg-center bg-cover border-r border-white/10"></div>
                
                <!-- 우측: 정보 (스크롤 가능 영역) -->
                <div class="p-10 flex flex-col justify-between overflow-hidden">
                    <div class="modal-scroll-area">
                        <div class="flex gap-3 mb-6">
                            <span id="modal-cat" class="px-3 py-1 bg-yellow-400 text-black text-[10px] font-black rounded"></span>
                            <span id="modal-patent" class="px-3 py-1 bg-blue-600 text-white text-[10px] font-black rounded"></span>
                        </div>
                        <h2 id="modal-title" class="text-5xl font-black mb-6 italic leading-tight tracking-tighter"></h2>
                        <p id="modal-desc" class="text-lg text-white/60 leading-relaxed mb-10"></p>
                    </div>
                    
                    <div class="pt-8 mt-4 border-t border-white/10">
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-sm font-bold text-white/30 uppercase">Matching Status</span>
                            <span class="text-green-400 font-black">● 전담 매니저 배정 가능</span>
                        </div>
                        <button onclick="requestMatch()" class="w-full py-5 bg-white text-black font-black text-2xl rounded-2xl hover:bg-yellow-400 transition">투자 매칭 신청하기</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let projects = [
            { id: 1, title: "양자 암호 보안 모듈", cat: "보안", patent: "보유", desc: "국가급 기밀 유지를 위한 퀀트 암호 기술입니다. 이 기술은 복잡한 수학적 알고리즘을 사용하여 해킹이 불가능한 수준의 보안을 제공합니다.", img: "https://images.unsplash.com/photo-1639322537228-f710d846310a?q=80&w=1000", author: "DevAlpha" },
            { id: 2, title: "차세대 AI 진단 도구", cat: "바이오", patent: "출원", desc: "딥러닝 기반 조기 암 진단 솔루션입니다. 수천 개의 임상 데이터를 학습하여 전문의 수준의 정확도를 자랑합니다.", img: "https://images.unsplash.com/photo-1576086213369-97a306d36557?q=80&w=1000", author: "BioLink" }
        ];

        function initAll() { renderProjects(projects); }

        function registerProject() {
            const title = document.getElementById('reg-title').value;
            const cat = document.getElementById('reg-category').value;
            const patent = document.getElementById('reg-patent').value;
            const desc = document.getElementById('reg-desc').value;
            const img = document.getElementById('reg-img').value || "https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=1000";

            if(!title || !desc) return alert("필수 항목을 입력하세요.");
            projects.unshift({ id: Date.now(), title, cat, patent, desc, img, author: "NewUser" });
            renderProjects(projects);
            confetti({ particleCount: 150 });
        }

        function renderProjects(data) {
            const grid = document.getElementById('project-grid');
            grid.innerHTML = data.map(p => `
                <div onclick="openModal(${p.id})" class="neon-border-card flex flex-col cursor-pointer group">
                    <div class="h-44 bg-cover bg-center" style="background-image: url('${p.img}')"></div>
                    <div class="p-6">
                        <span class="text-[10px] text-yellow-400 font-black uppercase mb-2 block">${p.cat}</span>
                        <h4 class="text-xl font-black mb-3 group-hover:text-yellow-400 transition">${p.title}</h4>
                        <p class="text-white/40 text-xs line-clamp-2">${p.desc}</p>
                    </div>
                </div>`).join('');
        }

        function openModal(id) {
            const p = projects.find(x => x.id === id);
            document.getElementById('modal-img-container').style.backgroundImage = `url('${p.img}')`;
            document.getElementById('modal-title').innerText = p.title;
            document.getElementById('modal-cat').innerText = p.cat;
            document.getElementById('modal-patent').innerText = p.patent;
            document.getElementById('modal-desc').innerText = p.desc;
            
            document.getElementById('project-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // 뒷배경 스크롤 방지
        }

        function closeModal() {
            document.getElementById('project-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function filterProjects() {
            const kw = document.getElementById('search-bar').value.toLowerCase();
            renderProjects(projects.filter(p => p.title.toLowerCase().includes(kw) || p.cat.toLowerCase().includes(kw)));
        }

        function requestMatch() { alert('매칭 요청 완료!'); closeModal(); }
    </script>
</body>
</html>
