<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가보자고 | 미래형 투자 매칭 엔진</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&family=Montserrat:wght@800&display=swap');
        :root { --primary-gold: #facc15; --bg-black: #050505; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-black); color: #fff; margin: 0; overflow-x: hidden; }
        
        .brand-group { display: flex; align-items: baseline; gap: 12px; }
        .brand-kor { font-size: 2.8rem; font-weight: 900; color: #fff; letter-spacing: -0.05em; }
        .brand-eng { font-family: 'Montserrat', sans-serif; font-size: 1.2rem; color: var(--primary-gold); letter-spacing: 0.1em; font-weight: 800; }
        
        .btn-gold { background: var(--primary-gold); color: #000; font-weight: 900; border-radius: 12px; transition: 0.3s; cursor: pointer; border: none; }
        .btn-gold:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(250, 204, 21, 0.5); }
        
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; }
        
        /* 뉴스피드 애니메이션 */
        .feed-item { animation: slideIn 0.5s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* 네비게이션 활성화 상태 */
        .nav-link.active { color: var(--primary-gold); border-bottom: 2px solid var(--primary-gold); }
    </style>
</head>
<body onload="initAll()">
    <nav class="p-8 flex justify-between items-center border-b border-white/5 sticky top-0 z-[100] bg-black/90 backdrop-blur-md">
        <div class="brand-group cursor-pointer" onclick="showSection('main')">
            <span class="brand-kor">가보자고</span>
            <span class="brand-eng">GABOJAGO</span>
        </div>
        <div class="flex items-center gap-10">
            <button onclick="showSection('main')" class="nav-link text-white/60 hover:text-white font-bold pb-1">메인 탐색</button>
            <button onclick="showSection('feed')" class="nav-link text-white/60 hover:text-white font-bold pb-1">뉴스피드</button>
            <button onclick="showSection('mypage')" class="nav-link text-white/60 hover:text-white font-bold pb-1">마이 자산</button>
            <button onclick="showSection('auth')" class="btn-gold px-8 py-3">로그인</button>
        </div>
    </nav>

    <!-- 1. 메인 섹션 (기존 유지) -->
    <main id="main-section" class="px-8 py-16 max-w-[1600px] mx-auto">
        <section class="mb-20 grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="stat-card p-10 bg-white/5 rounded-[3rem] text-center"><p class="text-white/40 mb-2">실시간 투자액</p><h3 class="text-5xl font-black">484억</h3></div>
            <div class="stat-card p-10 bg-yellow-400/5 border border-yellow-400/20 rounded-[3rem] text-center"><p class="text-yellow-400/60 mb-2">오늘의 수익률</p><h3 class="text-5xl font-black text-yellow-400">24.8%</h3></div>
            <div class="stat-card p-10 bg-white/5 rounded-[3rem] text-center"><p class="text-white/40 mb-2">활성 파트너</p><h3 class="text-5xl font-black">12개사</h3></div>
        </section>
        <div class="grid grid-cols-1 xl:grid-cols-4 gap-12">
            <div class="xl:col-span-1">
                <h3 class="text-2xl font-black mb-8 italic text-yellow-400">YIELD RANKING</h3>
                <div class="glass-card p-6 rounded-[2rem]" id="ranking-list"></div>
            </div>
            <div class="xl:col-span-3 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="project-container"></div>
        </div>
    </main>

    <!-- 2. 뉴스피드 섹션 (혁신: 실시간 스트리밍 피드) -->
    <section id="feed-section" class="hidden px-8 py-16 max-w-[1000px] mx-auto">
        <h2 class="text-4xl font-black mb-10 italic underline decoration-yellow-400">LIVE PULSE <span class="text-sm font-normal not-italic text-white/40 ml-4">플랫폼 실시간 동향</span></h2>
        <div id="feed-container" class="space-y-6">
            <!-- 뉴스 아이템이 여기에 생성됨 -->
        </div>
    </section>

    <!-- 3. 마이페이지 섹션 (혁신: 개인화 자산 대시보드) -->
    <section id="mypage-section" class="hidden px-8 py-16 max-w-[1200px] mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 glass-card p-10 rounded-[3rem]">
                <div class="w-24 h-24 bg-yellow-400 rounded-full mb-6 mx-auto flex items-center justify-center text-4xl text-black">👤</div>
                <h3 class="text-2xl font-black text-center mb-1">김가보자 투자자님</h3>
                <p class="text-white/40 text-center text-sm mb-8">Professional Angel</p>
                <div class="space-y-4 border-t border-white/10 pt-8">
                    <div class="flex justify-between"><span class="text-white/40">보유 등급</span><span class="text-yellow-400 font-bold">VVIP</span></div>
                    <div class="flex justify-between"><span class="text-white/40">참여 프로젝트</span><span class="font-bold">4개</span></div>
                </div>
            </div>
            <div class="lg:col-span-2 space-y-8">
                <div class="glass-card p-10 rounded-[3rem] bg-gradient-to-br from-yellow-400/10 to-transparent">
                    <h4 class="text-sm font-black text-white/40 uppercase mb-4">Total Portfolio Value</h4>
                    <h2 class="text-6xl font-black mb-2 text-yellow-400">12.5억</h2>
                    <p class="text-green-400 font-bold">▲ 전월 대비 12.4% 상승</p>
                </div>
                <div class="grid grid-cols-2 gap-6">
                    <div class="glass-card p-8 rounded-[2.5rem]">
                        <h5 class="text-xs text-white/40 mb-2">관심 프로젝트</h5>
                        <p class="text-2xl font-black">8개</p>
                    </div>
                    <div class="glass-card p-8 rounded-[2.5rem]">
                        <h5 class="text-xs text-white/40 mb-2">실행 대기중</h5>
                        <p class="text-2xl font-black">2건</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 4. 인증 섹션 (혁신: 몰입형 보안 인터페이스) -->
    <section id="auth-section" class="hidden min-h-[80vh] flex items-center justify-center">
        <div class="glass-card p-12 rounded-[4rem] w-full max-w-[450px] border-white/10 shadow-2xl">
            <h2 class="text-3xl font-black mb-8 text-center">GABOJAGO GATE</h2>
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] uppercase font-black text-white/40 ml-2">Investor ID</label>
                    <input type="text" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl focus:border-yellow-400 outline-none transition-all" placeholder="아이디를 입력하세요">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-black text-white/40 ml-2">Passkey</label>
                    <input type="password" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl focus:border-yellow-400 outline-none transition-all" placeholder="비밀번호를 입력하세요">
                </div>
                <button onclick="alert('환영합니다!')" class="btn-gold w-full py-5 text-lg uppercase mt-4">접속하기</button>
                <div class="flex justify-between text-xs text-white/40 px-2 font-bold">
                    <a href="#" class="hover:text-white">아이디 찾기</a>
                    <a href="#" class="hover:text-white">파트너 합류하기</a>
                </div>
            </div>
        </div>
    </section>

    <!-- 상세 모달 (기존 유지) -->
    <div id="project-modal" class="hidden fixed inset-0 z-[1000] flex items-center justify-center p-4 bg-black/95 backdrop-blur-md">
        <div class="glass-card w-full max-w-4xl rounded-[4rem] p-12 relative overflow-hidden">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-white/40 hover:text-white text-3xl">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        const projects = [
            { id: 0, name: "안전 보안 사이버", sub: "보안 및 네트워크 인프라", fund: "42억", dev: 24, angel: 8, tag: "인기 업종", yield: 32.5, desc: "양자 암호화 기술 기반 네트워크 보안 솔루션입니다.", tech: ["Quantum", "Security"], goal: "글로벌 점유율 확대" },
            { id: 1, name: "인공지능 퀀트", sub: "AI 모델링 및 알고리즘", fund: "78억", dev: 45, angel: 12, tag: "모집중", yield: 28.1, desc: "고빈도 매매 및 감성 분석 엔진입니다.", tech: ["ML", "Quant"], goal: "운용자산 1000억 돌파" },
            { id: 5, name: "K-컬처 콘텐츠 AI", sub: "미디어 생성 및 저작권", fund: "38억", dev: 15, angel: 4, tag: "글로벌", yield: 31.2, desc: "K-IP 기반 가상 아티스트 솔루션입니다.", tech: ["Generative AI", "IP"], goal: "글로벌 OTT 파트너십" }
            // (데이터 생략 방지를 위해 실제로는 더 많이 존재함)
        ];

        const feedData = [
            { type: 'FUND', content: '안전 보안 사이버 프로젝트에 5.2억 신규 투자가 집행되었습니다.', time: '방금 전' },
            { type: 'TECH', content: '인공지능 퀀트 팀이 알고리즘 V2.0 업데이트를 발표했습니다.', time: '10분 전' },
            { type: 'NEW', content: '차세대 배터리 분야 신규 제안서가 등록되었습니다.', time: '34분 전' },
            { type: 'MATCH', content: 'K-컬처 콘텐츠 AI 프로젝트의 매칭이 성공적으로 종료되었습니다.', time: '1시간 전' }
        ];

        function initAll() {
            renderProjects();
            renderRanking();
            renderFeed();
        }

        function showSection(section) {
            const sections = ['main', 'feed', 'mypage', 'auth'];
            sections.forEach(s => {
                document.getElementById(`${s}-section`).classList.add('hidden');
            });
            document.getElementById(`${section}-section`).classList.remove('hidden');
            
            // 네비게이션 활성화 표시
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            window.scrollTo(0,0);
        }

        function renderProjects() {
            const container = document.getElementById('project-container');
            container.innerHTML = projects.map(p => `
                <div onclick="openModal(${p.id})" class="glass-card p-8 rounded-[2.5rem] flex flex-col justify-between h-[360px] cursor-pointer hover:border-yellow-400/40 group">
                    <div><h4 class="text-2xl font-black mb-2 group-hover:text-yellow-400">${p.name}</h4><p class="text-white/30 text-xs">${p.sub}</p></div>
                    <p class="text-xl font-black text-yellow-400">${p.fund} 운용 중</p>
                </div>
            `).join('');
        }

        function renderFeed() {
            const container = document.getElementById('feed-container');
            container.innerHTML = feedData.map(f => `
                <div class="feed-item glass-card p-8 rounded-[2rem] flex items-center justify-between border-l-4 border-l-yellow-400">
                    <div>
                        <p class="text-lg font-medium text-gray-200">${f.content}</p>
                        <span class="text-xs text-white/20 font-bold uppercase tracking-widest mt-2 block">${f.time}</span>
                    </div>
                    <span class="bg-white/5 px-4 py-2 rounded-lg text-[10px] font-black text-yellow-400">${f.type}</span>
                </div>
            `).join('');
        }

        function renderRanking() {
            const list = document.getElementById('ranking-list');
            list.innerHTML = projects.map((p, i) => `
                <div class="flex justify-between py-4 border-b border-white/5">
                    <span class="font-black text-yellow-400">0${i+1}</span>
                    <span class="text-sm">${p.name}</span>
                    <span class="font-black">+${p.yield}%</span>
                </div>
            `).join('');
        }

        function openModal(id) {
            const p = projects.find(item => item.id === id) || projects[0];
            const modalBody = document.getElementById('modal-body');
            modalBody.innerHTML = `
                <h2 class="text-5xl font-black mb-6">${p.name}</h2>
                <p class="text-xl text-gray-400 mb-10">${p.desc}</p>
                <button onclick="closeModal()" class="btn-gold px-12 py-5 text-xl">투자 심사 시작</button>
            `;
            document.getElementById('project-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('project-modal').classList.add('hidden'); }
    </script>
</body>
</html>
