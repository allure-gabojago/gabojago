<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가보자고 | 엔젤-개발자 매칭 엔진</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&family=Montserrat:wght@700;900&display=swap');
        :root { --primary-gold: #facc15; --bg-black: #050505; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-black); color: #fff; margin: 0; overflow-x: hidden; }
        
        .trial-bar { background: var(--primary-gold); padding: 12px 0; text-align: center; font-size: 14px; font-weight: 900; color: #000; z-index: 1000; position: relative; }
        .brand-kor { font-size: 2.5rem; font-weight: 900; color: #fff; letter-spacing: -0.05em; line-height: 0.9; }
        .brand-eng { font-family: 'Montserrat', sans-serif; font-size: 0.8rem; color: var(--primary-gold); letter-spacing: 0.4em; font-weight: 900; margin-top: 4px; display: flex; justify-content: space-between; }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(250, 204, 21, 0.05); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden; 
        }
        .glass-card:hover { transform: translateY(-10px); border-color: var(--primary-gold); background: rgba(250, 204, 21, 0.05); }
        
        /* 역할 선택 버튼 스타일 */
        .role-btn {
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03);
            transition: 0.3s;
        }
        .role-btn.active {
            border-color: var(--primary-gold);
            background: rgba(250,204,21,0.1);
            color: var(--primary-gold);
        }

        #chat-feed { position: fixed; bottom: 30px; right: 30px; width: 320px; z-index: 500; display: flex; flex-direction: column; gap: 10px; }
        .chat-msg {
            background: rgba(20, 20, 20, 0.9); border: 1px solid var(--primary-gold);
            padding: 15px; border-radius: 15px; font-size: 12px; color: #fff;
            animation: slideIn 0.5s ease-out forwards; cursor: pointer;
            backdrop-filter: blur(10px);
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }

        .btn-gold { background: var(--primary-gold); color: #000; font-weight: 900; border-radius: 12px; transition: 0.3s; }
        #particle-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
        .num-font { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body onload="initAll()">
    <canvas id="particle-canvas"></canvas>
    <div class="trial-bar" id="top-banner">💎 지금 가입하면 7일간 엔젤 투자자 및 개발자 실시간 매칭 데이터를 무료로 제공합니다.</div>
    
    <nav class="p-8 flex justify-between items-center border-b border-white/5 sticky top-0 z-50 bg-black/80 backdrop-blur-md">
        <div class="brand-container flex flex-col cursor-pointer" onclick="location.reload()">
            <span class="brand-kor">가보자고</span>
            <div class="brand-eng uppercase"><span>G</span><span>A</span><span>B</span><span>O</span><span>J</span><span>A</span><span>G</span><span>O</span></div>
        </div>
        <div class="flex items-center gap-8">
            <button onclick="openAuth()" id="nav-auth-btn" class="btn-gold px-8 py-3 text-sm">무료로 시작하기</button>
        </div>
    </nav>

    <main class="px-8 py-16 max-w-[1400px] mx-auto">
        <section class="mb-20 grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="glass-card p-10 rounded-[3rem] text-center">
                <p class="text-gray-500 text-[10px] font-black mb-3 tracking-[0.2em]">TOTAL INVESTMENT</p>
                <h3 class="text-3xl font-black italic num-font">48.4B <span class="text-xs font-normal text-gray-600">KRW</span></h3>
            </div>
            <div class="glass-card p-10 rounded-[3rem] text-center border-yellow-400/30">
                <p class="text-yellow-400 text-[10px] font-black mb-3 tracking-[0.2em]">MATCHING SUCCESS</p>
                <h3 class="text-4xl font-black italic num-font text-yellow-400">892 <span class="text-sm text-yellow-400/50 uppercase italic">Cases</span></h3>
            </div>
            <div class="glass-card p-10 rounded-[3rem] text-center">
                <p class="text-gray-500 text-[10px] font-black mb-3 tracking-[0.2em]">ACTIVE BUILDERS</p>
                <h3 class="text-3xl font-black italic num-font">1,240 <span class="text-xs font-normal text-gray-600">Devs</span></h3>
            </div>
        </section>
        <div id="project-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </main>

    <!-- [신규] 회원가입/로그인 모달 -->
    <div id="auth-modal" class="fixed inset-0 z-[2000] hidden flex items-center justify-center bg-black/90 backdrop-blur-xl p-4">
        <div class="glass-card w-full max-w-md p-10 rounded-[3rem] border-yellow-400/20 relative">
            <button onclick="closeAuth()" class="absolute top-8 right-8 text-white/40 hover:text-white text-xl">✕</button>
            <div class="text-center mb-8">
                <h2 id="modal-title" class="text-3xl font-black mb-2">반갑습니다!</h2>
                <p id="modal-desc" class="text-gray-400 text-sm">본인의 역할을 선택하고 시작해 보세요.</p>
            </div>
            
            <!-- 역할 선택 -->
            <div id="role-selection" class="flex gap-4 mb-8">
                <button onclick="selectRole('investor')" id="role-inv" class="role-btn flex-1 py-4 rounded-2xl flex flex-col items-center gap-2">
                    <span class="text-2xl">👼</span><span class="text-xs font-black">투자자</span>
                </button>
                <button onclick="selectRole('dev')" id="role-dev" class="role-btn flex-1 py-4 rounded-2xl flex flex-col items-center gap-2">
                    <span class="text-2xl">👨‍💻</span><span class="text-xs font-black">개발자</span>
                </button>
            </div>

            <form onsubmit="handleAuth(event)" class="flex flex-col gap-4">
                <input type="email" placeholder="이메일 주소" required class="bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-yellow-400 outline-none transition-all text-sm">
                <input type="password" placeholder="비밀번호" required class="bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-yellow-400 outline-none transition-all text-sm">
                <button type="submit" class="btn-gold w-full py-4 mt-2 text-lg uppercase tracking-tight">가입하고 무료 체험하기</button>
            </form>

            <div class="mt-8 text-center text-[12px] text-gray-500">
                <span id="toggle-text">이미 계정이 있으신가요?</span>
                <button onclick="toggleAuthMode()" id="toggle-btn" class="text-yellow-400 font-bold ml-1 underline">로그인하기</button>
            </div>
        </div>
    </div>

    <div id="chat-feed"></div>

    <script>
        const projects = [
            { name: "안전 보안 사이버", sub: "Security & Dev", fund: 4200000000, tag: "매칭 급상승", dev: 24, angel: 8 },
            { name: "인공지능 퀀트", sub: "AI Models", fund: 7800000000, tag: "개발자 모집중", dev: 45, angel: 12 },
            { name: "반도체 클러스터", sub: "Hardware", fund: 8900000000, tag: "전략 산업", dev: 18, angel: 15 },
            { name: "디지털 헬스케어", sub: "Bio Tech", fund: 5200000000, tag: "미래 성장", dev: 31, angel: 6 },
            { name: "우주 물류 시스템", sub: "Logistics", fund: 3500000000, tag: "엔젤 집중", dev: 12, angel: 22 },
            { name: "차세대 2차 전지", sub: "Energy Storage", fund: 3100000000, tag: "필수 자산", dev: 27, angel: 9 },
            { name: "메타버스 인프라", sub: "Platform", fund: 2100000000, tag: "개발 중심", dev: 56, angel: 4 },
            { name: "양자 컴퓨터", sub: "Deep Tech", fund: 9500000000, tag: "고위험 고수익", dev: 8, angel: 19 },
            { name: "친환경 수소 에너지", sub: "Green Energy", fund: 4700000000, tag: "ESG 투자", dev: 22, angel: 11 },
            { name: "자율주행 모빌리티", sub: "Mobility", fund: 6300000000, tag: "핵심 기술", dev: 39, angel: 14 },
            { name: "로보틱스 자동화", sub: "Automation", fund: 5500000000, tag: "산업 혁명", dev: 33, angel: 7 },
            { name: "핀테크 블록체인", sub: "Web 3.0", fund: 3900000000, tag: "금융 혁신", dev: 62, angel: 18 }
        ];

        let selectedRole = null;
        let isLoginMode = false;

        function initAll() {
            renderProjects();
            initParticles();
            setInterval(createLiveMsg, 5000);
        }

        function openAuth() { document.getElementById('auth-modal').classList.remove('hidden'); }
        function closeAuth() { document.getElementById('auth-modal').classList.add('hidden'); }

        function selectRole(role) {
            selectedRole = role;
            document.getElementById('role-inv').classList.remove('active');
            document.getElementById('role-dev').classList.remove('active');
            if(role === 'investor') document.getElementById('role-inv').classList.add('active');
            else document.getElementById('role-dev').classList.add('active');
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            const title = document.getElementById('modal-title');
            const desc = document.getElementById('modal-desc');
            const roleArea = document.getElementById('role-selection');
            if(isLoginMode) {
                title.innerText = "로그인";
                desc.innerText = "투자 파트너가 당신을 기다리고 있습니다.";
                roleArea.classList.add('hidden');
                document.getElementById('toggle-text').innerText = "처음이신가요?";
                document.getElementById('toggle-btn').innerText = "회원가입하기";
            } else {
                title.innerText = "반갑습니다!";
                desc.innerText = "본인의 역할을 선택하고 시작해 보세요.";
                roleArea.classList.remove('hidden');
                document.getElementById('toggle-text').innerText = "이미 계정이 있으신가요?";
                document.getElementById('toggle-btn').innerText = "로그인하기";
            }
        }

        function handleAuth(e) {
            e.preventDefault();
            if(!isLoginMode && !selectedRole) return alert('투자자인지 개발자인지 역할을 선택해주세요!');
            
            const roleName = selectedRole === 'investor' ? '엔젤 투자자' : '개발자';
            alert(`${isLoginMode ? '로그인' : roleName + ' 가입'} 성공! 7일 무료 체험이 시작됩니다.`);
            closeAuth();
            document.getElementById('nav-auth-btn').innerText = "MY 대시보드";
            document.getElementById('top-banner').innerText = `🚀 ${roleName}님 전용 매칭 리포트가 활성화되었습니다. (체험판 7일 남음)`;
        }

        function renderProjects() {
            const container = document.getElementById('project-container');
            container.innerHTML = projects.map(p => `
                <div class="glass-card p-8 rounded-[2.5rem] flex flex-col justify-between h-[280px]">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <span class="px-2 py-1 bg-yellow-400/10 text-yellow-400 text-[9px] font-black rounded">${p.tag}</span>
                            <div class="flex gap-3 text-[10px] text-white/40 font-bold"><span>👨‍💻 ${p.dev}</span><span>👼 ${p.angel}</span></div>
                        </div>
                        <h4 class="text-xl font-black leading-tight mb-1">${p.name}</h4>
                        <p class="text-white/20 text-[9px] uppercase tracking-widest italic">${p.sub}</p>
                    </div>
                    <div class="mt-auto">
                        <div class="w-full bg-white/5 h-[2px] mb-4 overflow-hidden">
                            <div class="bg-yellow-400 h-full" style="width: ${Math.min(p.dev * 1.8, 100)}%"></div>
                        </div>
                        <div class="flex justify-between items-end">
                            <p class="text-sm font-black italic num-font">${p.fund.toLocaleString()} <span class="text-[10px] opacity-50 not-italic">KRW</span></p>
                            <button onclick="openAuth()" class="px-4 py-2 bg-white/5 border border-white/10 rounded-xl text-[10px] font-bold hover:bg-yellow-400 hover:text-black transition-all">연결하기</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function createLiveMsg() {
            const feed = document.getElementById('chat-feed');
            const msg = document.createElement('div');
            msg.className = 'chat-msg';
            msg.onclick = openAuth;
            msg.innerHTML = `<div class="flex justify-between mb-1"><span class="text-yellow-400 font-black">[LIVE]</span><span class="opacity-40 text-[9px]">Just now</span></div>
                <div class="text-[11px]">누군가 매칭 대화를 시작했습니다.</div>
                <div class="mt-2 text-[10px] text-yellow-400/70 italic">💬 가입 후 무료 참여 가능</div>`;
            feed.appendChild(msg);
            if(feed.childElementCount > 3) feed.removeChild(feed.firstChild);
            setTimeout(() => { msg.style.opacity = '0'; setTimeout(() => msg.remove(), 500); }, 8000);
        }

        function initParticles() {
            const canvas = document.getElementById('particle-canvas'); const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let p = Array.from({length: 30}, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, s: Math.random() * 2, v: Math.random() * 0.3 }));
            function draw() { ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = 'rgba(250,204,21,0.1)'; p.forEach(i => { i.y -= i.v; if(i.y < 0) i.y = canvas.height; ctx.beginPath(); ctx.arc(i.x, i.y, i.s, 0, Math.PI*2); ctx.fill(); }); requestAnimationFrame(draw); }
            draw();
        }
    </script>
</body>
</html>
