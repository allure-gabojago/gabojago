<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가보자고 V2.1 | 하이엔드 투자 엔진</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Montserrat:wght@900&display=swap');
        
        :root { 
            --primary-gold: #facc15; 
            --neon-purple: #a855f7; 
            --neon-blue: #3b82f6; 
            --bg-black: #010101; 
        }

        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--bg-black); 
            color: #fff; 
            margin: 0; 
            word-break: keep-all;
        }

        .text-gradient { 
            background: linear-gradient(to right, #facc15, #f472b6, #3b82f6); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .neon-border-card { 
            position: relative; 
            background: rgba(255, 255, 255, 0.03); 
            border-radius: 3rem; 
            transition: 0.5s; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            overflow: hidden; 
        }

        .neon-border-card:hover { 
            transform: translateY(-10px); 
            border-color: var(--primary-gold); 
            box-shadow: 0 0 50px rgba(250, 204, 21, 0.2); 
        }
        
        /* 프리미엄 채널 버튼 강화 */
        .btn-auth { 
            background: #fff; 
            color: #000; 
            font-weight: 900; 
            padding: 1.2rem 3.5rem; 
            border-radius: 1.5rem; 
            font-size: 1.4rem; 
            transition: 0.3s; 
            box-shadow: 0 0 25px rgba(255,255,255,0.2);
            border: none;
            cursor: pointer;
        }

        .btn-auth:hover { 
            transform: scale(1.05); 
            background: var(--primary-gold); 
            box-shadow: 0 0 40px var(--primary-gold); 
        }

        /* 시뮬레이터 슬라이더 스타일 */
        .sim-slider { 
            -webkit-appearance: none; 
            width: 100%; 
            height: 12px; 
            background: #222; 
            border-radius: 10px; 
            outline: none; 
            margin: 2rem 0; 
        }

        .sim-slider::-webkit-slider-thumb { 
            -webkit-appearance: none; 
            width: 35px; 
            height: 35px; 
            background: #fff; 
            border-radius: 50%; 
            cursor: pointer; 
            box-shadow: 0 0 25px var(--primary-gold); 
            border: 7px solid var(--primary-gold); 
        }

        /* 스크롤바 숨기기 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body onload="initAll()">
    
    <!-- 네비게이션 바 -->
    <nav class="p-12 flex justify-between items-center max-w-[1800px] mx-auto">
        <h1 class="text-6xl font-black italic tracking-tighter text-gradient cursor-pointer" onclick="location.reload()">가보자고.</h1>
        <div class="hidden lg:flex gap-16 text-xl font-black text-white/30">
            <button class="hover:text-white transition-all">프로젝트 탐색</button>
            <button class="hover:text-white transition-all">실시간 동향</button>
            <button class="hover:text-white transition-all">나의 자산</button>
        </div>
        <!-- 수정된 프리미엄 채널 버튼 -->
        <button class="btn-auth" onclick="alert('투자자와 개발자를 위한 프리미엄 채널 보안 검증을 시작합니다.')">프리미엄 채널</button>
    </nav>

    <!-- 메인 섹션 -->
    <main class="px-12 py-10 max-w-[1800px] mx-auto">
        <div id="project-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-12">
            <!-- 자바스크립트로 12개 업종 생성 -->
        </div>
    </main>

    <!-- 상세 분석 레이어 (모달) -->
    <div id="project-modal" class="hidden fixed inset-0 z-[1000] flex items-center justify-center p-8 bg-black/98 backdrop-blur-3xl overflow-y-auto">
        <div class="neon-border-card w-full max-w-[95%] xl:max-w-7xl rounded-[5rem] p-12 md:p-20 relative bg-black border-white/10">
            <button onclick="closeModal()" class="absolute top-10 right-12 text-white/20 hover:text-white text-8xl font-thin transition-colors">&times;</button>
            
            <div id="modal-body" class="grid lg:grid-cols-2 gap-20 xl:gap-32 items-center">
                <!-- 상세 내용 동적 삽입 -->
            </div>
        </div>
    </div>

    <script>
        // 12개 핵심 업종 데이터 (보안/안전 1순위)
        const projectData = [
            { id: 1, name: "국가급 양자암호 보안", sub: "QUANTUM SECURITY", yield: 42.5, color: "#a855f7", tech: "C++, Rust", commits: "5,200+", score: 99, val: 120 },
            { id: 2, name: "인공지능 퀀트 투자", sub: "AI QUANT ENGINE", yield: 35.8, color: "#3b82f6", tech: "Python, PyTorch", commits: "3,100+", score: 96, val: 85 },
            { id: 3, name: "바이오 헬스 테크", sub: "BIO GENOME", yield: 51.2, color: "#10b981", tech: "Bio-Data AI", commits: "1,500+", score: 92, val: 150 },
            { id: 4, name: "저궤도 우주 통신", sub: "SPACE LINK", yield: 28.4, color: "#ec4899", tech: "Embedded C", commits: "4,400+", score: 98, val: 210 },
            { id: 5, name: "지능형 로보틱스", sub: "SMART ROBOT", yield: 33.1, color: "#f97316", tech: "ROS2, C++", commits: "2,800+", score: 94, val: 95 },
            { id: 6, name: "메타버스 가상 경제", sub: "META ECONOMY", yield: 25.7, color: "#facc15", tech: "Unreal Engine 5", commits: "6,100+", score: 90, val: 70 },
            { id: 7, name: "그린 에너지 그리드", sub: "GREEN ENERGY", yield: 19.5, color: "#84cc16", tech: "IoT, Cloud", commits: "1,200+", score: 88, val: 110 },
            { id: 8, name: "자율주행 모빌리티", sub: "AUTO PILOT", yield: 38.9, color: "#ef4444", tech: "LiDAR AI", commits: "7,500+", score: 97, val: 180 },
            { id: 9, name: "핀테크 블록체인", sub: "DEFI PROTOCOL", yield: 44.2, color: "#06b6d4", tech: "Solidity, Go", commits: "3,900+", score: 95, val: 130 },
            { id: 10, name: "에듀테크 맞춤 AI", sub: "EDU TECH", yield: 22.4, color: "#6366f1", tech: "NLP, Python", commits: "900+", score: 89, val: 45 },
            { id: 11, name: "스마트 팜 플랫폼", sub: "AGRI TECH", yield: 18.2, color: "#fbbf24", tech: "Sensors, AI", commits: "1,100+", score: 91, val: 55 },
            { id: 12, name: "사이버 범죄 수사 AI", sub: "CYBER CRIME AI", yield: 30.5, color: "#64748b", tech: "Big Data, OSINT", commits: "2,200+", score: 93, val: 75 }
        ];

        function initAll() { renderProjects(); }

        function renderProjects() {
            const container = document.getElementById('project-grid');
            container.innerHTML = projectData.map(p => `
                <div onclick="openModal(${p.id})" class="neon-border-card p-12 h-[500px] flex flex-col justify-between cursor-pointer group">
                    <div>
                        <div class="w-20 h-2 bg-gradient-to-r from-transparent to-white/20 mb-10"></div>
                        <h4 class="text-4xl font-black mb-6 group-hover:text-gradient transition-all leading-tight tracking-tighter">${p.name}</h4>
                        <p class="text-xs font-black opacity-30 tracking-[0.4em] uppercase">${p.sub}</p>
                    </div>
                    <div>
                        <p class="text-[11px] font-black text-white/30 mb-3 tracking-widest uppercase">Target Yield</p>
                        <p class="text-6xl font-black tracking-tighter" style="color: ${p.color}">+${p.yield}%</p>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            const p = projectData.find(x => x.id === id);
            const body = document.getElementById('modal-body');
            body.innerHTML = `
                <div class="space-y-16">
                    <div>
                        <span class="text-xl font-black text-gradient uppercase tracking-[0.5em] mb-6 block">Premium Channel Insight</span>
                        <h2 class="text-7xl md:text-8xl font-black leading-none italic mb-10 tracking-tighter">${p.name}</h2>
                    </div>

                    <div class="bg-white/5 rounded-[4rem] p-12 md:p-16 border border-white/10 shadow-2xl">
                        <h5 class="text-3xl font-black mb-12 text-white italic underline underline-offset-8 decoration-yellow-400">개발자 기술 딥 다이브</h5>
                        <div class="grid grid-cols-1 gap-8">
                            <div class="flex justify-between items-center bg-black/50 p-10 rounded-3xl border border-white/5">
                                <span class="text-2xl font-bold text-white/40">기술 스택</span>
                                <span class="text-4xl font-black text-blue-400 uppercase">${p.tech}</span>
                            </div>
                            <div class="flex justify-between items-center bg-black/50 p-10 rounded-3xl border border-white/5">
                                <span class="text-2xl font-bold text-white/40">코드 커밋</span>
                                <span class="text-4xl font-black text-purple-400">${p.commits}</span>
                            </div>
                            <div class="flex justify-between items-center bg-black/50 p-10 rounded-3xl border border-white/5">
                                <span class="text-2xl font-bold text-white/40">AI 신뢰도</span>
                                <span class="text-6xl font-black text-yellow-400">${p.score}%</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col justify-center">
                    <div class="neon-border-card p-16 md:p-20 bg-gradient-to-br from-white/5 to-transparent border-white/20">
                        <h5 class="text-4xl font-black text-center mb-16 italic tracking-tighter text-white/80">가상 투자 시뮬레이터</h5>
                        
                        <div class="mb-16">
                            <div class="flex justify-between items-end mb-6">
                                <span class="text-2xl font-bold text-white/40">나의 투자 금액</span>
                                <span class="text-5xl font-black text-gradient" id="inv-amount-txt">5,000만원</span>
                            </div>
                            <input type="range" min="100" max="10000" step="100" value="5000" class="sim-slider" id="amount-range" oninput="calcSim(${p.yield})">
                        </div>

                        <div class="space-y-10 bg-black/60 p-12 rounded-[3rem] border border-white/10">
                            <div class="flex justify-between items-center">
                                <span class="text-2xl font-bold text-white/40">예상 기업가치 성장</span>
                                <span class="text-4xl font-black text-green-400">약 4.2배 성장</span>
                            </div>
                            <div class="pt-8 border-t border-white/10">
                                <p class="text-2xl font-bold text-white/40 mb-6 text-center">3년 후 예상 회수액</p>
                                <p class="text-7xl md:text-8xl font-black text-yellow-400 text-center tracking-tighter" id="return-txt">₩ 2.1억</p>
                            </div>
                        </div>

                        <button onclick="triggerInvest()" class="w-full mt-16 py-10 bg-white text-black font-black text-3xl rounded-[2rem] hover:bg-yellow-400 transition-all shadow-[0_0_50px_rgba(255,255,255,0.2)]">
                            심사 확정하기
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('project-modal').classList.remove('hidden');
            calcSim(p.yield);
        }

        function calcSim(yield) {
            const amount = document.getElementById('amount-range').value;
            document.getElementById('inv-amount-txt').innerText = (amount >= 10000 ? '1.0 억원' : amount + ' 만원');
            const result = (amount * (1 + yield/100) * 1.5).toFixed(0);
            document.getElementById('return-txt').innerText = '₩ ' + (result / 10000).toFixed(1) + '억';
        }

        function closeModal() { document.getElementById('project-modal').classList.add('hidden'); }
        
        function triggerInvest() {
            confetti({ particleCount: 400, spread: 120, origin: { y: 0.6 }, colors: ['#facc15', '#ffffff', '#a855f7'] });
            alert('프리미엄 채널을 통한 투자 심사 제안이 성공적으로 전달되었습니다.');
            closeModal();
        }
    </script>
</body>
</html>
