<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>가보자고 GABOJAGO | 통합 복구 버전</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@900&family=Montserrat:wght@900&display=swap');
        
        :root { --primary-gold: #facc15; --bg-black: #010101; }
        body { background-color: var(--bg-black); color: #fff; margin: 0; font-family: 'Noto Sans KR', sans-serif; }

        /* [수정] 한글과 영어 사이즈를 동일하게 좌측 정렬 */
        .brand-unit {
            display: inline-flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }

        .text-gradient { 
            background: linear-gradient(to right, #facc15, #f472b6, #3b82f6); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        /* [핵심] 한글과 영어 크기를 2.5rem으로 동일하게 통일 */
        .logo-kr { 
            font-size: 2.5rem; 
            font-weight: 900; 
            font-style: italic; 
            line-height: 1.1;
            display: block;
        }
        
        .logo-en { 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 900; 
            font-size: 2.5rem; 
            color: #ffffff;
            text-transform: uppercase;
            display: block;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        /* 박스 및 입력창 스타일 */
        .modern-card { background: rgba(255, 255, 255, 0.04); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.15); }
        .label-text { font-size: 1rem; font-weight: 900; color: var(--primary-gold); margin-bottom: 8px; display: block; }
        .input-dark { background: #111; border: 1px solid #333; padding: 15px; border-radius: 12px; color: #fff; width: 100%; outline: none; font-size: 1.1rem; }
        .input-dark:focus { border-color: var(--primary-gold); }

        /* [추가] 카드 텍스트 선명도 강화 */
        .card-title { font-size: 1.5rem; font-weight: 900; color: #fff; margin-bottom: 8px; }
        .card-desc { font-size: 1rem; color: rgba(255, 255, 255, 0.7); line-height: 1.5; }
    </style>
</head>
<body>
    
    <!-- 네비게이션: 동일 사이즈 로고 (좌측) -->
    <nav class="pt-12 px-12 max-w-[1600px] mx-auto">
        <div class="brand-unit cursor-pointer group" onclick="location.reload()">
            <span class="logo-kr text-gradient">가보자고.</span>
            <h1 class="logo-en">GABOJAGO</h1>
        </div>
    </nav>

    <!-- 프로젝트 등록 섹션 -->
    <section class="max-w-[1600px] mx-auto px-12 py-10">
        <div class="modern-card p-10">
            <h2 class="text-2xl font-black italic text-gradient mb-8 uppercase">Project Registration</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div class="space-y-6">
                    <div>
                        <label class="label-text">프로젝트 제목</label>
                        <input type="text" class="input-dark" placeholder="제목을 입력하세요">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="label-text">카테고리</label>
                            <select class="input-dark">
                                <option>01. 사이버 보안</option>
                                <option>02. 인공지능(AI)</option>
                                <option>03. 바이오 테크</option>
                                <option>04. 우주 항공</option>
                                <option>05. 로보틱스</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-text">이미지 URL</label>
                            <input type="text" class="input-dark" placeholder="https://">
                        </div>
                    </div>
                </div>
                <div class="space-y-6">
                    <div>
                        <label class="label-text">상세 설명</label>
                        <textarea class="input-dark h-[120px] resize-none" placeholder="설명을 입력하세요"></textarea>
                    </div>
                    <button class="w-full py-4 bg-white text-black font-black text-xl rounded-xl hover:bg-yellow-400 transition-all">등록 확정</button>
                </div>
            </div>
        </div>
    </section>

    <!-- [수정] 사라졌던 업종별 카드 리스트 전원 복구 -->
    <section class="max-w-[1600px] mx-auto px-12 py-12">
        <h3 class="text-xl font-black text-white/40 mb-8 tracking-widest uppercase">Current Projects</h3>
        <div id="project-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
            <!-- 01. 사이버 보안 -->
            <div class="modern-card overflow-hidden group cursor-pointer">
                <div class="h-56 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=800')"></div>
                <div class="p-8">
                    <span class="text-yellow-400 font-bold text-xs mb-2 block uppercase">01. 사이버 보안</span>
                    <h4 class="card-title group-hover:text-yellow-400 transition-colors">양자 암호 보안</h4>
                    <p class="card-desc italic">국가 보안 등급의 차세대 양자 암호화 시스템</p>
                </div>
            </div>
            <!-- 02. 인공지능 (이미지 포함 복구) -->
            <div class="modern-card overflow-hidden group cursor-pointer">
                <div class="h-56 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1677442136019-21780ecad995?w=800')"></div>
                <div class="p-8">
                    <span class="text-yellow-400 font-bold text-xs mb-2 block uppercase">02. 인공지능(AI)</span>
                    <h4 class="card-title group-hover:text-yellow-400 transition-colors">하이퍼 뉴럴 엔진</h4>
                    <p class="card-desc italic">비즈니스 자동화를 위한 지능형 AI 솔루션</p>
                </div>
            </div>
            <!-- 03. 바이오 테크 -->
            <div class="modern-card overflow-hidden group cursor-pointer">
                <div class="h-56 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1530026405186-ed1f139313f8?w=800')"></div>
                <div class="p-8">
                    <span class="text-yellow-400 font-bold text-xs mb-2 block uppercase">03. 바이오 테크</span>
                    <h4 class="card-title group-hover:text-yellow-400 transition-colors">유전자 분석 플랫폼</h4>
                    <p class="card-desc italic">개인 맞춤형 헬스케어를 위한 유전자 데이터 분석</p>
                </div>
            </div>
            <!-- 04. 로보틱스 -->
            <div class="modern-card overflow-hidden group cursor-pointer">
                <div class="h-56 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1581092160562-40aa08e78837?w=800')"></div>
                <div class="p-8">
                    <span class="text-yellow-400 font-bold text-xs mb-2 block uppercase">04. 로보틱스</span>
                    <h4 class="card-title group-hover:text-yellow-400 transition-colors">자율주행 협동 로봇</h4>
                    <p class="card-desc italic">물류 혁신을 위한 AI 기반 자율주행 로봇 시스템</p>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
