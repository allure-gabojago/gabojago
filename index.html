<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>가보자고 GABOJAGO | 정렬 완성</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@900&family=Montserrat:wght@900&display=swap');
        
        :root { --primary-gold: #facc15; --bg-black: #010101; }
        body { background-color: var(--bg-black); color: #fff; margin: 0; font-family: 'Noto Sans KR', sans-serif; }

        /* [핵심] 로고 상하 너비 강제 일치 시스템 */
        .brand-container {
            display: inline-flex;
            flex-direction: column;
            /* 한글 너비에 맞게 고정 (약 200px) */
            width: 205px; 
            align-items: stretch;
            cursor: pointer;
        }

        .text-gradient { 
            background: linear-gradient(to right, #facc15, #f472b6, #3b82f6); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        .logo-kr { 
            font-size: 2.8rem; 
            font-weight: 900; 
            font-style: italic; 
            line-height: 1;
            display: block;
            /* 한글 자간을 미세하게 조정하여 영문과 맞춤 */
            letter-spacing: -0.05em;
            white-space: nowrap;
        }
        
        .logo-en { 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 900; 
            font-size: 1.35rem; /* 길이를 맞추기 위한 최적 크기 */
            color: #ffffff;
            text-transform: uppercase;
            line-height: 1.2;
            margin-top: 2px;
            /* [중요] 자석처럼 양 끝을 한글 끝선에 맞춤 */
            display: flex;
            justify-content: space-between;
            width: 100%;
        }

        .modern-card { background: rgba(255, 255, 255, 0.04); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.15); transition: 0.3s; }
        .label-text { font-size: 1rem; font-weight: 900; color: var(--primary-gold); margin-bottom: 8px; display: block; }
        .input-dark { background: #111; border: 1px solid #333; padding: 15px; border-radius: 12px; color: #fff; width: 100%; outline: none; }
    </style>
</head>
<body onload="filterCategory()">
    
    <!-- 네비게이션: 좌측 정렬 및 상하 길이 일치 로고 -->
    <nav class="pt-12 px-12 max-w-[1600px] mx-auto">
        <div class="brand-container group" onclick="location.reload()">
            <span class="logo-kr text-gradient">가보자고.</span>
            <!-- 각 철자를 분산 배치하여 한글 길이에 강제 맞춤 -->
            <div class="logo-en">
                <span>G</span><span>A</span><span>B</span><span>O</span><span>J</span><span>A</span><span>G</span><span>O</span>
            </div>
        </div>
    </nav>

    <!-- 프로젝트 등록 및 필터 섹션 -->
    <section class="max-w-[1600px] mx-auto px-12 py-10">
        <div class="modern-card p-10">
            <h2 class="text-2xl font-black italic text-gradient mb-8 uppercase">Project Registration</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div class="space-y-6">
                    <div>
                        <label class="label-text">프로젝트 제목</label>
                        <input type="text" class="input-dark" placeholder="제목을 입력하세요">
                    </div>
                    <div>
                        <label class="label-text">카테고리 선택 (업종별 필터링)</label>
                        <select id="category-selector" class="input-dark bg-[#111]" onchange="filterCategory()">
                            <option value="01">01. 사이버 보안</option>
                            <option value="02" selected>02. 인공지능(AI)</option>
                            <option value="03">03. 바이오 테크</option>
                            <option value="04">04. 로보틱스</option>
                        </select>
                    </div>
                </div>
                <div class="space-y-6">
                    <div>
                        <label class="label-text">상세 설명</label>
                        <textarea class="input-dark h-[120px] resize-none" placeholder="설명을 입력하세요"></textarea>
                    </div>
                    <button class="w-full py-4 bg-white text-black font-black text-xl rounded-xl hover:bg-yellow-400">등록 및 필터 적용</button>
                </div>
            </div>
        </div>
    </section>

    <!-- 결과 리스트 영역 -->
    <section class="max-w-[1600px] mx-auto px-12 py-12">
        <div id="project-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
            <!-- 필터링된 카드가 출력되는 곳 -->
        </div>
    </section>

    <script>
        const data = [
            { code: "01", cat: "01. 사이버 보안", title: "양자 암호 보안", img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=400", desc: "차세대 네트워크 보안" },
            { code: "01", cat: "01. 사이버 보안", title: "클라우드 방화벽", img: "https://images.unsplash.com/photo-1563986768609-322da13575f3?w=400", desc: "실시간 위협 탐지" },
            { code: "02", cat: "02. 인공지능(AI)", title: "뉴럴 AI 엔진", img: "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=400", desc: "지능형 프로세스 자동화" },
            { code: "03", cat: "03. 바이오 테크", title: "유전자 분석 기술", img: "https://images.unsplash.com/photo-1530026405186-ed1f139313f8?w=400", desc: "맞춤형 의료 데이터" },
            { code: "04", cat: "04. 로보틱스", title: "물류 자율 주행 로봇", img: "https://images.unsplash.com/photo-1581092160562-40aa08e78837?w=400", desc: "스마트 팩토리 최적화" }
        ];

        function filterCategory() {
            const val = document.getElementById('category-selector').value;
            const grid = document.getElementById('project-grid');
            const filtered = data.filter(item => item.code === val);
            
            grid.innerHTML = filtered.map(item => `
                <div class="modern-card overflow-hidden group">
                    <div class="h-48 bg-cover bg-center" style="background-image: url('${item.img}')"></div>
                    <div class="p-6">
                        <span class="text-yellow-400 text-xs font-bold">${item.cat}</span>
                        <h4 class="text-xl font-black mt-2">${item.title}</h4>
                        <p class="text-white/60 text-sm mt-2">${item.desc}</p>
                    </div>
                </div>
            `).join('');
        }
    </script>
<style>
    /* 업종 섹션 전체 컨테이너 */
    .gabojago-sector-section {
        padding: 80px 20px;
        background-color: #ffffff;
        font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
    }

    .sector-wrapper {
        max-width: 1100px;
        margin: 0 auto;
        text-align: center;
    }

    .sector-header h2 {
        font-size: 2.2rem;
        color: #1a1a1a;
        margin-bottom: 10px;
        font-weight: 800;
        letter-spacing: -0.02em;
    }

    .sector-header p {
        color: #666;
        margin-bottom: 50px;
        font-size: 1.1rem;
    }

    /* 12개 그리드 배치 */
    .sector-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr); /* 한 줄에 4개씩 */
        gap: 20px;
    }

    .sector-item {
        background: #f9fafb;
        border: 1px solid #eee;
        border-radius: 16px;
        padding: 35px 20px;
        transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .sector-item span {
        font-size: 1.15rem;
        font-weight: 700;
        color: #333;
    }

    /* 마우스 호버 효과 (투자자들의 눈길을 끄는 효과) */
    .sector-item:hover {
        transform: translateY(-8px);
        background: #007bff;
        border-color: #007bff;
        box-shadow: 0 15px 30px rgba(0, 123, 255, 0.15);
    }

    .sector-item:hover span {
        color: #ffffff;
    }

    /* 모바일 및 태블릿 대응 (반응형) */
    @media (max-width: 1024px) {
        .sector-grid { grid-template-columns: repeat(3, 1fr); } /* 3개씩 */
    }
    @media (max-width: 768px) {
        .sector-grid { grid-template-columns: repeat(2, 1fr); } /* 2개씩 */
        .sector-header h2 { font-size: 1.8rem; }
    }
</style>

<section class="gabojago-sector-section">
    <div class="sector-wrapper">
        <div class="sector-header">
            <h2>12개 전문 분야 매칭</h2>
            <p>투자자와 개발자가 만나 혁신을 만드는 12개 핵심 업종입니다.</p>
        </div>
        
        <div class="sector-grid">
            <div class="sector-item"><span>IT / 소프트웨어</span></div>
            <div class="sector-item"><span>핀테크 / 금융</span></div>
            <div class="sector-item"><span>바이오 / 헬스케어</span></div>
            <div class="sector-item"><span>반도체 / HW</span></div>
            <div class="sector-item"><span>AI / 로보틱스</span></div>
            <div class="sector-item"><span>에너지 / 친환경</span></div>
            <div class="sector-item"><span>이커머스 / 유통</span></div>
            <div class="sector-item"><span>엔터 / 게임</span></div>
            <div class="sector-item"><span>모빌리티 / 자율주행</span></div>
            <div class="sector-item"><span>에듀테크</span></div>
            <div class="sector-item"><span>블록체인 / Web3</span></div>
            <div class="sector-item"><span>부동산 / 프롭테크</span></div>
        </div>
    </div>
</section>
</body>
</html>
