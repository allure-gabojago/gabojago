<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가보자고 GABOJAGO | 하이엔드 투자 매칭 플랫폼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Montserrat:wght@400;900&display=swap');
        
        :root { --primary-gold: #facc15; --bg-black: #010101; }
        
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--bg-black); 
            color: #fff; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* 로고 스타일 */
        .text-gradient { background: linear-gradient(to right, #facc15, #f472b6, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-kr { font-family: 'Noto Sans KR', sans-serif; font-weight: 900; font-style: italic; line-height: 1; }
        .logo-en { font-family: 'Montserrat', sans-serif; font-weight: 400; letter-spacing: 0.3em; font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 2px; }

        /* 카드 및 입력창 */
        .neon-border-card { background: rgba(255, 255, 255, 0.03); border-radius: 2rem; border: 1px solid rgba(255, 255, 255, 0.08); transition: 0.4s; }
        .input-dark { 
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 1rem; padding: 1rem; color: white; width: 100%; outline: none; transition: 0.3s;
        }
        .input-dark:focus { border-color: var(--primary-gold); background: rgba(255,255,255,0.12); }

        /* [핵심] 커스텀 업종 선택 드롭다운 */
        .custom-select-wrapper { position: relative; width: 100%; }
        .custom-select-trigger {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 1rem; padding: 1rem; color: white; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }
        .custom-options {
            position: absolute; top: calc(100% + 8px); left: 0; right: 0;
            background: #151515; border: 1px solid var(--primary-gold);
            border-radius: 1.2rem; z-index: 100; display: none;
            max-height: 320px; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .custom-options.show { display: block; animation: fadeIn 0.2s ease-out; }
        .option-item { 
            padding: 14px 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); 
            font-size: 0.95rem; transition: 0.2s;
        }
        .option-item:hover { background: var(--primary-gold); color: black; font-weight: bold; }
        .option-item:last-child { border-bottom: none; }

        /* 애니메이션 및 스크롤 */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-options::-webkit-scrollbar { width: 6px; }
        .custom-options::-webkit-scrollbar-thumb { background: var(--primary-gold); border-radius: 10px; }
        .modal-scroll-area { max-height: 55vh; overflow-y: auto; padding-right: 10px; }
    </style>
</head>
<body onload="initAll()">
    
    <!-- 상단 네비게이션 (모든 화면 공통) -->
    <nav class="p-8 flex justify-between items-center max-w-[1600px] mx-auto">
        <!-- 듀얼 로고: 클릭 시 홈으로 -->
        <div class="flex flex-col cursor-pointer group" onclick="location.reload()">
            <h1 class="text-4xl logo-kr text-gradient group-hover:scale-105 transition-transform">가보자고.</h1>
            <span class="logo-en ml-1">GABOJAGO</span>
        </div>
        <div class="flex gap-4">
            <button class="bg-white text-black px-7 py-2.5 rounded-xl font-black hover:bg-yellow-400 transition-all transform hover:-translate-y-1">프리미엄 채널</button>
        </div>
    </nav>

    <!-- 프로젝트 등록 섹션 -->
    <section id="register-section" class="max-w-[1600px] mx-auto px-8 py-6">
        <div class="neon-border-card p-10 bg-gradient-to-b from-white/5 to-transparent shadow-2xl">
            <h2 class="text-3xl font-black mb-8 italic text-gradient uppercase tracking-tighter">Project Submission</h2>
            <div class="grid lg:grid-cols-2 gap-10">
                <div class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-black text-white/30 mb-2 tracking-[0.3em]">PROJECT NAME</label>
                        <input type="text" id="reg-title" class="input-dark" placeholder="혁신적인 프로젝트 명을 입력하세요">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-white/30 mb-2 tracking-[0.3em]">CATEGORY (12 SECTORS)</label>
                            <div class="custom-select-wrapper">
                                <div class="custom-select-trigger" onclick="toggleOptions()">
                                    <span id="selected-cat">01. 사이버 보안</span>
                                    <svg class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                                <div class="custom-options" id="cat-options">
                                    <div class="option-item" onclick="selectCat('01. 사이버 보안')">01. 사이버 보안</div>
                                    <div class="option-item" onclick="selectCat('02. 인공지능(AI)')">02. 인공지능(AI)</div>
                                    <div class="option-item" onclick="selectCat('03. 바이오 테크')">03. 바이오 테크</div>
                                    <div class="option-item" onclick="selectCat('04. 우주 통신')">04. 우주 통신</div>
                                    <div class="option-item" onclick="selectCat('05. 로보틱스')">05. 로보틱스</div>
                                    <div class="option-item" onclick="selectCat('06. 가상 경제')">06. 가상 경제</div>
                                    <div class="option-item" onclick="selectCat('07. 그린 에너지')">07. 그린 에너지</div>
                                    <div class="option-item" onclick="selectCat('08. 자율주행')">08. 자율주행</div>
                                    <div class="option-item" onclick="selectCat('09. 핀테크/DeFi')">09. 핀테크/DeFi</div>
                                    <div class="option-item" onclick="selectCat('10. 맞춤형 교육')">10. 맞춤형 교육</div>
                                    <div class="option-item" onclick="selectCat('11. 애그리 테크')">11. 애그리 테크</div>
                                    <div class="option-item" onclick="selectCat('12. 범죄 수사 AI')">12. 범죄 수사 AI</div>
                                </div>
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-white/30 mb-2 tracking-[0.3em]">IMAGE URL</label>
                            <!-- 스마트 URL 자동완성 기능 -->
                            <input type="text" id="reg-img" class="input-dark" placeholder="https://" 
                                   onfocus="autoFillUrl(this)" onmouseover="autoFillUrl(this)">
                        </div>
                    </div>
                </div>
                <div class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-black text-white/30 mb-2 tracking-[0.3em]">DESCRIPTION</label>
                        <textarea id="reg-desc" class="input-dark h-[110px] resize-none" placeholder="투자자가 매력을 느낄 수 있는 핵심 설명을 입력하세요."></textarea>
                    </div>
                    <button onclick="registerProject()" class="w-full py-4 bg-white text-black font-black text-xl rounded-xl hover:bg-yellow-400 transition-all shadow-lg active:scale-95">플랫폼 등록 확정</button>
                </div>
            </div>
        </div>
    </section>

    <!-- 프로젝트 그리드 리스트 -->
    <section class="max-w-[1600px] mx-auto px-8 py-10">
        <h3 class="text-2xl font-black italic mb-10 border-b border-white/10 pb-4">ACTIVE PROJECTS</h3>
        <div id="project-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </section>

    <!-- 상세 모달 (로고 포함) -->
    <div id="project-modal" class="hidden fixed inset-0 z-[1000] flex items-center justify-center p-4 bg-black/95 backdrop-blur-md">
        <div class="neon-border-card w-full max-w-5xl bg-black border-white/20 relative overflow-hidden shadow-2xl">
            <!-- 모달 내부 미니 로고 -->
            <div class="absolute top-6 left-10 z-10 flex flex-col opacity-40">
                <span class="text-xl font-black italic text-white">가보자고.</span>
                <span class="text-[8px] tracking-[0.2em] text-white/70">GABOJAGO</span>
            </div>
            
            <button onclick="closeModal()" class="absolute top-6 right-8 text-4xl font-thin text-white/50 hover:text-white z-20">&times;</button>
            
            <div id="modal-content" class="grid lg:grid-cols-2 h-full max-h-[85vh]">
                <div id="modal-img-container" class="h-64 lg:h-full bg-center bg-cover border-r border-white/10"></div>
                <div class="p-12 flex flex-col justify-between overflow-hidden pt-24">
                    <div class="modal-scroll-area">
                        <span id="modal-cat-tag" class="text-yellow-400 text-xs font-black tracking-widest mb-4 block"></span>
                        <h2 id="modal-title" class="text-5xl font-black mb-6 italic text-gradient leading-tight tracking-tighter"></h2>
                        <p id="modal-desc" class="text-lg text-white/60 leading-relaxed"></p>
                    </div>
                    <button onclick="requestMatch()" class="w-full mt-8 py-5 bg-white text-black font-black text-2xl rounded-2xl hover:bg-yellow-400 transition-all shadow-2xl">투자 매칭 신청하기</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 드롭다운 및 선택 로직
        function toggleOptions() { document.getElementById('cat-options').classList.toggle('show'); }
        function selectCat(val) {
            document.getElementById('selected-cat').innerText = val;
            document.getElementById('cat-options').classList.remove('show');
        }
        window.onclick = function(e) { 
            if (!e.target.closest('.custom-select-wrapper')) {
                document.getElementById('cat-options').classList.remove('show');
            }
        }

        // URL 자동 채우기
        function autoFillUrl(i) { if (i.value === "") i.value = "https://"; }

        // 데이터 및 렌더링
        let projects = [
            { id: 1, title: "국가 보안 퀀트 엔진", cat: "01. 사이버 보안", desc: "양자 암호화 기반 차세대 국가 보안 엔진입니다.", img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=1000" },
            { id: 2, title: "AI 심혈관 예측", cat: "02. 인공지능(AI)", desc: "딥러닝 알고리즘 기반 의료 AI 솔루션입니다.", img: "https://images.unsplash.com/photo-1576091160550-2173dad99901?auto=format&fit=crop&q=80&w=1000" }
        ];

        function initAll() { renderProjects(projects); }

        function registerProject() {
            const t = document.getElementById('reg-title').value;
            const c = document.getElementById('selected-cat').innerText;
            const d = document.getElementById('reg-desc').value;
            let i = document.getElementById('reg-img').value;

            if(i === "https://" || !i) i = "https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1000";
            if(!t || !d) return alert("프로젝트명과 설명을 입력해 주세요.");

            projects.unshift({ id: Date.now(), title: t, cat: c, desc: d, img: i });
            renderProjects(projects);
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            
            // 초기화
            document.getElementById('reg-title').value = "";
            document.getElementById('reg-desc').value = "";
            document.getElementById('reg-img').value = "";
            alert("프로젝트가 성공적으로 등록되었습니다!");
        }

        function renderProjects(data) {
            const grid = document.getElementById('project-grid');
            grid.innerHTML = data.map(p => `
                <div onclick="openModal(${p.id})" class="neon-border-card flex flex-col cursor-pointer group h-[380px] hover:scale-[1.02] transition-all">
                    <div class="h-40 bg-cover bg-center" style="background-image: url('${p.img}')"></div>
                    <div class="p-8">
                        <span class="text-[10px] text-yellow-400 font-black mb-2 block tracking-widest">${p.cat}</span>
                        <h4 class="text-xl font-black mb-3 group-hover:text-yellow-400 transition-colors">${p.title}</h4>
                        <p class="text-white/40 text-[11px] line-clamp-2 italic">${p.desc}</p>
                    </div>
                </div>`).join('');
        }

        function openModal(id) {
            const p = projects.find(x => x.id === id);
            document.getElementById('modal-img-container').style.backgroundImage = `url('${p.img}')`;
            document.getElementById('modal-title').innerText = p.title;
            document.getElementById('modal-cat-tag').innerText = p.cat;
            document.getElementById('modal-desc').innerText = p.desc;
            document.getElementById('project-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() { 
            document.getElementById('project-modal').classList.add('hidden'); 
            document.body.style.overflow = 'auto';
        }

        function requestMatch() { alert('매칭 신청이 완료되었습니다. 담당자가 곧 연락드립니다!'); closeModal(); }
    </script>
</body>
</html>
