<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가보자고 | 프리미엄 AI 투자 플랫폼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&family=Montserrat:wght@900&display=swap');
        
        :root { 
            --primary-gold: #facc15; 
            --neon-purple: #a855f7;
            --neon-blue: #3b82f6;
            --bg-black: #020202; 
        }

        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--bg-black); 
            color: #fff; 
            margin: 0; 
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 5% 10%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 95% 90%, rgba(59, 130, 246, 0.15) 0%, transparent 50%);
        }

        /* 네온 보더 카드 효과 */
        .neon-border-card {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 2.5rem;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .neon-border-card:hover {
            transform: translateY(-15px);
            border-color: var(--primary-gold);
            box-shadow: 0 0 40px rgba(250, 204, 21, 0.15);
            background: rgba(255, 255, 255, 0.05);
        }

        /* 텍스트 그라데이션 */
        .text-gradient {
            background: linear-gradient(to right, #facc15, #f472b6, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 커스텀 슬라이더 (그라데이션 바 적용) */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 10px;
            background: linear-gradient(to right, #3b82f6, #a855f7, #f472b6); /* 파란색 중심 그라데이션 */
            outline: none;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 0 20px #fff;
            border: 4px solid var(--neon-purple);
        }

        .btn-glow {
            background: linear-gradient(45deg, #facc15, #fbbf24);
            color: #000;
            font-weight: 900;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.4);
            transition: 0.4s;
        }

        .btn-glow:hover {
            box-shadow: 0 0 40px rgba(250, 204, 21, 0.7);
            transform: scale(1.05) rotate(-1deg);
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #ff4d4d;
            box-shadow: 0 0 15px #ff4d4d;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.6); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body onload="initAll()">
    
    <!-- 최상단 AI 매칭 바 -->
    <div class="bg-black/60 backdrop-blur-2xl py-5 px-10 border-b border-white/5 sticky top-0 z-[200]">
        <div class="max-w-[1600px] mx-auto flex flex-wrap items-center justify-between gap-8">
            <div class="flex items-center gap-5">
                <span class="text-[10px] font-black bg-white text-black px-4 py-1 rounded-full tracking-tighter">AI 분석 가동중</span>
                <p class="text-sm font-bold">나의 투자 DNA: <span id="dna-label" class="text-gradient font-black text-xl ml-2 italic">밸런스 성장형</span></p>
            </div>
            <div class="flex items-center gap-6 flex-1 max-w-xl">
                <span class="text-xs font-black text-blue-400">안정 추구</span>
                <input type="range" id="dna-slider" min="0" max="100" value="50" oninput="updateDNA(this.value)">
                <span class="text-xs font-black text-pink-500">수익 극대화</span>
            </div>
        </div>
    </div>

    <!-- 네비게이션 (한글화) -->
    <nav class="p-10 flex justify-between items-center max-w-[1600px] mx-auto">
        <div class="brand-group cursor-pointer group" onclick="showSection('main')">
            <h1 class="text-5xl font-black italic tracking-tighter group-hover:text-yellow-400 transition-all duration-500">가보자고.</h1>
        </div>
        <div class="flex items-center gap-12">
            <div class="hidden lg:flex gap-12 text-sm font-black tracking-widest text-white/40">
                <button onclick="showSection('main')" class="hover:text-white transition-colors">프로젝트 탐색</button>
                <button onclick="showSection('feed')" class="hover:text-white transition-colors">실시간 동향</button>
                <button onclick="showSection('mypage')" class="hover:text-white transition-colors">나의 자산</button>
            </div>
            <button onclick="showSection('auth')" class="btn-glow px-10 py-4 text-sm tracking-tighter">접속하기</button>
        </div>
    </nav>

    <!-- [1] 메인 프로젝트 섹션 -->
    <main id="main-section" class="px-10 py-16 max-w-[1600px] mx-auto">
        <header class="mb-24">
            <h2 class="text-7xl md:text-9xl font-black tracking-tighter mb-10 leading-none">
                꿈을 <span class="text-gradient">현실로.</span><br>
                자본을 <span class="text-gradient italic">가치로.</span>
            </h2>
            <div class="flex flex-wrap gap-5">
                <div class="px-8 py-4 bg-white/5 rounded-2xl border border-white/10 font-bold text-sm backdrop-blur-lg hover:border-yellow-400/50 transition-all cursor-default"># 인공지능 매칭 엔진</div>
                <div class="px-8 py-4 bg-white/5 rounded-2xl border border-white/10 font-bold text-sm backdrop-blur-lg hover:border-blue-400/50 transition-all cursor-default"># 프리미엄 딜 소싱</div>
            </div>
        </header>

        <div id="project-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
            <!-- 자바스크립트 렌더링 영역 -->
        </div>
    </main>

    <!-- [2] 실시간 동향 섹션 (화려하게 통일) -->
    <section id="feed-section" class="hidden px-10 py-24 max-w-[1200px] mx-auto">
        <h2 class="text-6xl font-black mb-20 italic">LIVE <span class="text-blue-500 underline decoration-yellow-400 underline-offset-8">분석 동향</span></h2>
        <div id="feed-list" class="grid gap-8"></div>
    </section>

    <!-- [3] 나의 자산 섹션 (화려하게 통일) -->
    <section id="mypage-section" class="hidden px-10 py-24 max-w-[1400px] mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-16">
            <div class="neon-border-card p-12 border-purple-500/20 bg-gradient-to-b from-purple-500/10 to-transparent">
                <p class="text-white/30 font-black mb-3 tracking-widest uppercase">Investor Profile</p>
                <h3 class="text-5xl font-black mb-12">김가보자</h3>
                <div class="space-y-8">
                    <div class="flex justify-between items-center border-b border-white/5 pb-4">
                        <span class="text-white/50 font-bold">멤버십</span>
                        <span class="text-purple-400 font-black tracking-widest">PLATINUM</span>
                    </div>
                    <div class="flex justify-between items-center border-b border-white/5 pb-4">
                        <span class="text-white/50 font-bold">포트폴리오</span>
                        <span class="text-blue-400 font-black">12개 프로젝트</span>
                    </div>
                </div>
            </div>
            <div class="lg:col-span-2 neon-border-card p-12 bg-gradient-to-br from-blue-500/10 via-transparent to-pink-500/10">
                <p class="text-white/30 font-black mb-5 tracking-widest uppercase">Total Asset Value</p>
                <h2 class="text-7xl md:text-8xl font-black mb-10 text-gradient italic tracking-tighter">₩ 1,250,000,000</h2>
                <div class="h-6 bg-black/50 rounded-full overflow-hidden p-1.5 border border-white/5">
                    <div class="h-full bg-gradient-to-r from-blue-600 via-purple-600 to-yellow-500 rounded-full shadow-[0_0_25px_rgba(168,85,247,0.6)]" style="width: 82%"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- [4] 로그인 섹션 (화려하게 통일) -->
    <section id="auth-section" class="hidden min-h-[70vh] flex items-center justify-center">
        <div class="neon-border-card p-20 w-full max-w-[550px] border-white/10 text-center">
            <div class="mb-12 text-7xl animate-pulse">✨</div>
            <h2 class="text-5xl font-black mb-12 italic tracking-tighter">프리미엄 접속</h2>
            <div class="space-y-6">
                <input type="text" class="w-full bg-white/5 border border-white/10 p-6 rounded-2xl outline-none focus:border-yellow-400 transition-all text-center font-bold text-xl" placeholder="투자자 고유 식별 코드">
                <button class="btn-glow w-full py-6 text-xl">보안 게이트 통과</button>
            </div>
        </div>
    </section>

    <!-- 상세 모달 -->
    <div id="project-modal" class="hidden fixed inset-0 z-[1000] flex items-center justify-center p-6 bg-black/98 backdrop-blur-3xl">
        <div class="neon-border-card w-full max-w-6xl rounded-[4rem] p-16 relative border-yellow-400/20">
            <button onclick="closeModal()" class="absolute top-12 right-12 text-white/30 hover:text-white text-6xl font-thin transition-colors">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        const projectData = [
            { id: 1, name: "양자 암호 보안", sub: "QUANTUM DEFENSE", yield: 32.5, viewers: 8, dna: 10, color: "#a855f7" },
            { id: 2, name: "인공지능 퀀트", sub: "HFT ALGORITHM", yield: 28.1, viewers: 15, dna: 85, color: "#3b82f6" },
            { id: 3, name: "K-미디어 생성 AI", sub: "GEN-MEDIA IP", yield: 31.2, viewers: 24, dna: 60, color: "#facc15" },
            { id: 4, name: "저궤도 우주 통신", sub: "SPACE-LINK X", yield: 15.4, viewers: 3, dna: 95, color: "#ec4899" },
            { id: 5, name: "자율주행 제어", sub: "LIDAR AUTO-PILOT", yield: 25.7, viewers: 12, dna: 75, color: "#10b981" },
            { id: 6, name: "전고체 차세대 전지", sub: "SOLID-STATE BATT", yield: 27.3, viewers: 19, dna: 40, color: "#f97316" }
        ];

        function initAll() {
            renderProjects(50);
            renderFeed();
        }

        function updateDNA(val) {
            const label = document.getElementById('dna-label');
            if(val < 35) label.innerText = "안정 지향형";
            else if(val < 70) label.innerText = "밸런스 성장형";
            else label.innerText = "수익 극대화형";
            renderProjects(val);
        }

        function renderProjects(dnaFilter = 50) {
            const container = document.getElementById('project-grid');
            container.innerHTML = projectData.map(p => {
                const matchScore = 100 - Math.abs(p.dna - dnaFilter);
                return `
                <div onclick="openModal(${p.id})" class="neon-border-card p-12 h-[480px] flex flex-col justify-between cursor-pointer group">
                    <div class="absolute -right-16 -top-16 w-56 h-56 rounded-full blur-[80px] opacity-10 transition-all duration-1000 group-hover:opacity-30" style="background: ${p.color}"></div>
                    <div>
                        <div class="flex justify-between items-start mb-12">
                            <span class="text-[10px] font-black px-4 py-1.5 bg-white/10 rounded-full border border-white/10">매칭률 ${matchScore}%</span>
                            <div class="flex items-center text-[10px] font-black text-red-500">
                                <div class="live-dot"></div> <span class="ml-2 uppercase">${p.viewers}명 활성</span>
                            </div>
                        </div>
                        <h4 class="text-4xl font-black mb-5 group-hover:text-yellow-400 transition-all leading-[1.1]">${p.name}</h4>
                        <p class="text-[11px] font-black opacity-30 tracking-[0.3em] uppercase">${p.sub}</p>
                    </div>
                    <div>
                        <div class="mb-10">
                            <p class="text-[10px] font-black text-white/30 mb-3 tracking-widest uppercase">기대 수익률</p>
                            <p class="text-6xl font-black tracking-tighter" style="color: ${p.color}">+${p.yield}%</p>
                        </div>
                        <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                            <div class="h-full transition-all duration-1000" style="width: ${matchScore}%; background: ${p.color}"></div>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function renderFeed() {
            const feedList = document.getElementById('feed-list');
            const feeds = [
                { tag: "투자 성공", text: "방금 전 익명의 투자자가 [인공지능 퀀트] 프로젝트에 대규모 자본을 투입했습니다.", time: "방금" },
                { tag: "업데이트", text: "[양자 암호 보안] 기술팀이 CES 2024 혁신상을 수상하는 쾌거를 이루었습니다.", time: "12분 전" },
                { tag: "AI 추천", text: "사용자님의 성향 변화를 감지하여 [저궤도 우주 통신] 프로젝트가 추천 목록에 추가되었습니다.", time: "1시간 전" }
            ];
            feedList.innerHTML = feeds.map(f => `
                <div class="neon-border-card p-10 flex flex-col md:flex-row md:items-center justify-between gap-8 hover:bg-white/5 transition-all">
                    <div class="flex items-start gap-6">
                        <div class="w-16 h-16 rounded-2xl bg-yellow-400/10 flex items-center justify-center text-2xl">⚡</div>
                        <div>
                            <span class="text-[10px] font-black text-yellow-400 uppercase tracking-widest">${f.tag}</span>
                            <p class="text-2xl font-bold text-white/90 mt-2 italic leading-relaxed">${f.text}</p>
                        </div>
                    </div>
                    <span class="text-xs font-black text-white/20 whitespace-nowrap">${f.time}</span>
                </div>
            `).join('');
        }

        function openModal(id) {
            const p = projectData.find(x => x.id === id);
            const body = document.getElementById('modal-body');
            body.innerHTML = `
                <div class="grid lg:grid-cols-2 gap-24">
                    <div>
                        <span class="text-xs font-black uppercase tracking-[0.6em] mb-6 block" style="color: ${p.color}">Premium Investment</span>
                        <h2 class="text-7xl md:text-8xl font-black mb-12 leading-none italic">${p.name}</h2>
                        <p class="text-2xl text-white/50 font-medium leading-relaxed mb-16">
                            현재 ${p.viewers}명의 검증된 투자자들이 이 딜을 실시간으로 분석하고 있습니다. 
                            ${p.sub} 분야의 독보적인 기술력으로 차세대 시장을 선도할 준비가 된 프로젝트입니다.
                        </p>
                        <button onclick="triggerInvest()" class="btn-glow w-full py-8 text-2xl uppercase tracking-tighter">투자 심사 확정하기</button>
                    </div>
                    <div class="flex flex-col justify-center">
                        <div class="neon-border-card p-14 bg-gradient-to-br from-white/5 to-transparent border-white/10">
                            <h5 class="text-sm font-black mb-12 opacity-30 tracking-[0.4em] uppercase">투자 핵심 지표</h5>
                            <div class="space-y-10">
                                <div class="flex justify-between items-end border-b border-white/5 pb-6">
                                    <span class="text-white/40 font-bold text-lg italic underline decoration-yellow-400">목표 수익률</span>
                                    <span class="text-6xl font-black tracking-tighter" style="color: ${p.color}">+${p.yield}%</span>
                                </div>
                                <div class="flex justify-between items-end border-b border-white/5 pb-6">
                                    <span class="text-white/40 font-bold text-lg italic">기술 등급</span>
                                    <span class="text-4xl font-black italic">AAA+</span>
                                </div>
                                <div class="flex justify-between items-end pt-4">
                                    <span class="text-white/40 font-bold text-lg italic">매칭 안정성</span>
                                    <span class="text-4xl font-black text-blue-400">최상위</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('project-modal').classList.remove('hidden');
        }

        function showSection(id) {
            ['main', 'feed', 'mypage', 'auth'].forEach(s => document.getElementById(s + '-section').classList.add('hidden'));
            document.getElementById(id + '-section').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closeModal() { document.getElementById('project-modal').classList.add('hidden'); }
        
        function triggerInvest() {
            confetti({ particleCount: 250, spread: 100, origin: { y: 0.6 }, colors: ['#facc15', '#a855f7', '#3b82f6', '#ffffff'] });
            alert('축하합니다! 당신의 첫 번째 투자가 공식 심사 단계로 진입했습니다.');
            closeModal();
        }
    </script>
</body>
</html>
