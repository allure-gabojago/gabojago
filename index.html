<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>가보자고 GABOJAGO | 좌측 정렬 및 복구</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@900&family=Montserrat:wght@900&display=swap');
        
        :root { --primary-gold: #facc15; --bg-black: #010101; }
        body { background-color: var(--bg-black); color: #fff; margin: 0; font-family: 'Noto Sans KR', sans-serif; }

        /* [핵심] 로고 디자인: 좌측 정렬 + 한글 작게/영어 크게 */
        .brand-unit {
            display: inline-flex;
            flex-direction: column;
            align-items: flex-start; /* 좌측 정렬 */
            text-align: left;
        }

        .text-gradient { 
            background: linear-gradient(to right, #facc15, #f472b6, #3b82f6); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        .logo-kr { 
            font-size: 1.5rem; /* 한글 크기 축소 */
            font-weight: 900; 
            font-style: italic; 
            line-height: 1;
            letter-spacing: 0.1em;
            display: block;
            margin-bottom: 2px;
            margin-left: 2px; /* 영문과 시각적 라인 맞춤 */
        }
        
        .logo-en { 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 900; 
            font-size: 3.2rem; /* 영문 크기 확대 */
            color: #ffffff;
            text-transform: uppercase;
            display: block;
            line-height: 0.9;
            letter-spacing: -0.02em;
        }

        /* 컨텐츠 박스 스타일 */
        .modern-card { 
            background: rgba(255, 255, 255, 0.04); 
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.12); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        .label-text { 
            font-size: 0.95rem; 
            font-weight: 900; 
            color: var(--primary-gold); 
            margin-bottom: 10px; 
            display: block;
            letter-spacing: -0.02em;
        }

        .input-dark {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); 
            padding: 16px; border-radius: 12px; color: #fff; width: 100%; font-size: 1.1rem; outline: none;
        }
        .input-dark:focus { border-color: var(--primary-gold); background: rgba(255,255,255,0.08); }

        .btn-submit {
            background: #fff; color: #000; padding: 20px; border-radius: 16px;
            font-weight: 900; font-size: 1.5rem; transition: 0.3s;
        }
        .btn-submit:hover { background: var(--primary-gold); transform: translateY(-2px); }
    </style>
</head>
<body>
    
    <!-- 네비게이션: 좌측 정렬 로고 -->
    <nav class="pt-12 px-12 max-w-[1600px] mx-auto flex justify-between items-end">
        <div class="brand-unit cursor-pointer group" onclick="location.reload()">
            <span class="logo-kr text-gradient">가보자고.</span>
            <h1 class="logo-en group-hover:text-yellow-400">GABOJAGO</h1>
        </div>
        <div class="pb-2">
            <button class="bg-white/10 hover:bg-white/20 text-white border border-white/20 px-6 py-2 rounded-lg font-bold text-sm transition-all">프리미엄 채널</button>
        </div>
    </nav>

    <!-- 프로젝트 등록 섹션 (한글 복구) -->
    <section class="max-w-[1600px] mx-auto px-12 py-10">
        <div class="modern-card p-12">
            <h2 class="text-3xl font-black italic text-gradient mb-12">프로젝트 등록 시스템</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                <!-- 왼쪽 컬럼 -->
                <div class="space-y-8">
                    <div>
                        <label class="label-text">프로젝트 제목</label>
                        <input type="text" class="input-dark" placeholder="등록할 프로젝트의 명칭을 입력하세요">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="label-text">카테고리 설정</label>
                            <select class="input-dark bg-[#111]">
                                <option>01. 사이버 보안</option>
                                <option selected>02. 인공지능(AI)</option>
                                <option>03. 바이오 테크</option>
                                <option>04. 우주 항공</option>
                                <option>05. 로보틱스</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-text">대표 이미지 URL</label>
                            <input type="text" class="input-dark" placeholder="https://">
                        </div>
                    </div>
                </div>
                <!-- 오른쪽 컬럼 -->
                <div class="space-y-8">
                    <div>
                        <label class="label-text">프로젝트 상세 설명</label>
                        <textarea class="input-dark h-[145px] resize-none" placeholder="핵심 내용을 간략하게 설명해 주세요"></textarea>
                    </div>
                    <button class="btn-submit w-full shadow-2xl">플랫폼 등록 확정</button>
                </div>
            </div>
        </div>
    </section>

    <!-- 카드 리스트 영역 -->
    <section class="max-w-[1600px] mx-auto px-12 py-12">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
            <div class="modern-card overflow-hidden group cursor-pointer">
                <div class="h-60 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1677442136019-21780ecad995?w=800&q=80')"></div>
                <div class="p-8">
                    <span class="text-yellow-400 font-bold text-xs mb-2 block">02. 인공지능(AI)</span>
                    <h4 class="text-xl font-black mb-3">하이퍼 뉴럴 AI 엔진</h4>
                    <p class="text-white/60 text-sm leading-relaxed italic">지능형 자동화 시스템을 통한 비즈니스 최적화 솔루션</p>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
