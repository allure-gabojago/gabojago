<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가보자고 | 프리미엄 투자 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&family=Montserrat:wght@900&display=swap');
        :root { --primary-gold: #facc15; --bg-black: #000; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-black); color: #fff; margin: 0; -webkit-font-smoothing: antialiased; }
        
        .brand-kor { font-size: 2.6rem; font-weight: 900; color: #fff; letter-spacing: -0.05em; line-height: 0.9; }
        .brand-eng { font-family: 'Montserrat', sans-serif; font-size: 0.85rem; color: var(--primary-gold); letter-spacing: 0.38em; font-weight: 900; opacity: 0.8; margin-top: 6px; display: flex; justify-content: space-between; }
        
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px); border: 1px solid rgba(250, 204, 21, 0.12); transition: 0.3s; position: relative; }
        
        /* 🚩 유료 회원 전용 마스킹 스타일 */
        .blur-info { filter: blur(5px); pointer-events: none; user-select: none; opacity: 0.5; }
        .premium-lock { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 10; border-radius: 2rem; border: 1px solid rgba(250, 204, 21, 0.2); }

        .trial-bar { background: #facc15; padding: 10px 0; text-align: center; font-size: 11px; font-weight: 900; color: #000; }
        .btn-gold { background: var(--primary-gold); color: #000; font-weight: 900; border-radius: 12px; transition: 0.3s; cursor: pointer; }
        #particle-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
    </style>
</head>
<body onload="initAll()">
    <div class="trial-bar uppercase">
        🚀 현재 베이직 모드 이용 중 | 프리미엄 전환 시 모든 프로젝트 상세 분석 리포트 공개
    </div>

    <canvas id="particle-canvas"></canvas>

    <nav class="p-8 flex justify-between items-center border-b border-white/5 sticky top-0 z-50 bg-black/90 backdrop-blur-md">
        <div class="brand-container flex flex-col">
            <span class="brand-kor uppercase">가보자고</span>
            <div class="brand-eng uppercase"><span>G</span><span>A</span><span>B</span><span>O</span><span>J</span><span>A</span><span>G</span><span>O</span></div>
        </div>
        <div class="flex items-center gap-8">
            <div class="text-right border-r border-white/10 pr-8 hidden md:block">
                <p class="text-[12px] text-gray-500 font-black mb-1 uppercase">Asset</p>
                <p class="text-2xl font-black text-white italic"><span id="my-wallet" class="text-yellow-400">500,000,000</span> 원</p>
            </div>
            <button onclick="alert('결제 페이지로 이동합니다.')" class="btn-gold px-8 py-3 text-sm uppercase">PREMIUM 결제하기</button>
        </div>
    </nav>

    <main class="px-8 py-12 max-w-[1400px] mx-auto">
        <section class="mb-16">
            <div class="bg-gradient-to-r from-yellow-400/10 to-black p-10 rounded-[3rem] border border-yellow-400/20 grid grid-cols-1 md:grid-cols-3 gap-10">
                <div class="border-r border-white/10">
                    <p class="text-gray-400 text-[10px] font-black uppercase mb-2">Portfolio Value</p>
                    <h3 class="text-4xl font-black text-white italic">48,450,000,000 <span class="text-sm font-normal">원</span></h3>
                </div>
                <div class="border-r border-white/10 relative">
                    <p class="text-gray-400 text-[10px] font-black uppercase mb-2">Premium Yield</p>
                    <h3 class="text-4xl font-black blur-info italic">+24.8%</h3>
                    <div class="absolute inset-0 flex items-end"><span class="text-[9px] text-yellow-400 font-bold bg-black/80 px-2 py-1 rounded">PREMIUM ONLY</span></div>
                </div>
                <div>
                    <p class="text-gray-400 text-[10px] font-black uppercase mb-2">User Rank</p>
                    <h3 class="text-2xl font-black text-yellow-400 italic uppercase">Basic Member</h3>
                </div>
            </div>
        </section>

        <div id="project-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mb-32"></div>
    </main>

    <footer class="border-t border-white/5 py-12 px-8 bg-black">
        <div class="max-w-[1400px] mx-auto">
            <p class="text-[11px] text-gray-500">경기도 고양시 일산동구 무궁화로 31-16 7층 | 대표전화 031-815-1666 | 관리자 강성필 팀장</p>
            <p class="mt-4 text-[9px] text-gray-800 uppercase tracking-widest">© 2026 GABOJAGO STRATEGIC INVESTMENT</p>
        </div>
    </footer>

    <script>
        let myBalance = 500000000;
        const projects = [
            { name: "사이버 보안 엔진", sub: "Security", fund: 4200000000, tag: "보안 1순위", isPremium: false },
            { name: "인공지능 퀀트", sub: "AI Quant", fund: 7800000000, tag: "Hottest", isPremium: false },
            { name: "반도체 클러스터", sub: "Semi-Conductor", fund: 8900000000, tag: "Premium", isPremium: true },
            { name: "디지털 헬스케어", sub: "Bio Tech", fund: 5200000000, tag: "Premium", isPremium: true },
            { name: "차세대 2차 전지", sub: "Energy", fund: 3100000000, tag: "Energy", isPremium: false },
            { name: "K-콘텐츠 & 엔터", sub: "K-Culture", fund: 2400000000, tag: "Premium", isPremium: true }
        ];

        function initAll() { renderProjects(); initParticles(); }

        function renderProjects() {
            const container = document.getElementById('project-container');
            container.innerHTML = projects.map((p, i) => `
                <div class="glass-card p-8 rounded-[2rem] overflow-hidden">
                    ${p.isPremium ? `
                    <div class="premium-lock">
                        <div class="text-center">
                            <p class="text-yellow-400 font-black text-xs mb-2">PREMIUM</p>
                            <button onclick="alert('결제가 필요합니다.')" class="text-[10px] text-white bg-white/10 px-4 py-2 rounded-full border border-white/20">분석 리포트 보기</button>
                        </div>
                    </div>` : ''}
                    <div class="${p.isPremium ? 'blur-info' : ''}">
                        <span class="px-2 py-1 bg-yellow-400/10 text-yellow-400 text-[9px] font-black rounded uppercase">${p.tag}</span>
                        <h4 class="text-xl font-black mt-4 mb-8 leading-tight">${p.name}<br><span class="text-white/20 font-light text-[10px] italic uppercase tracking-widest">${p.sub}</span></h4>
                        <div class="flex justify-between items-end">
                            <p class="text-sm font-black text-white">${p.fund.toLocaleString()} 원</p>
                            <button class="px-5 py-2 bg-white/5 border border-white/10 rounded-xl text-[10px] font-bold hover:bg-yellow-400 transition-all">거래</button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function initParticles() {
            const canvas = document.getElementById('particle-canvas'); const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let p = Array.from({length: 30}, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, s: Math.random() * 1.5, v: Math.random() * 0.2 }));
            function draw() { ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = 'rgba(250,204,21,0.15)'; p.forEach(i => { i.y -= i.v; if(i.y < 0) i.y = canvas.height; ctx.beginPath(); ctx.arc(i.x, i.y, i.s, 0, Math.PI*2); ctx.fill(); }); requestAnimationFrame(draw); }
            draw();
        }
    </script>
</body>
</html>
