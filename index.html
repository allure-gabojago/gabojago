<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>가보자고 GABOJAGO | 디자인 완성형</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@900&family=Montserrat:wght@900&display=swap');
        
        :root { --primary-gold: #facc15; --bg-black: #010101; }
        
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--bg-black); color: #fff; margin: 0; overflow-x: hidden;
        }

        /* [핵심] 로고 황금비율 정렬 */
        .logo-container {
            display: inline-flex;
            flex-direction: column;
            align-items: flex-start; /* 왼쪽 정렬 기준 */
        }
        .text-gradient { background: linear-gradient(to right, #facc15, #f472b6, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .logo-kr { 
            font-size: 3.5rem; /* PC 기준 크기 */
            font-weight: 900; 
            font-style: italic; 
            line-height: 0.85; /* 영문과의 간격을 좁힘 */
            letter-spacing: -0.05em; /* 한글 자간을 살짝 조여 밀도감 상승 */
        }
        
        .logo-en { 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 900; 
            /* [강조] 한글 너비와 일치하도록 자간 대폭 확장 */
            font-size: 0.85rem; 
            letter-spacing: 0.63em; 
            color: #ffffff;
            text-transform: uppercase;
            width: 100%;
            text-align: justify;
            margin-top: 0.2rem;
            padding-left: 0.15rem; /* 시각적 시작점 보정 */
        }

        /* 카드 및 텍스트 스타일 */
        .card-title { font-size: 1.5rem; font-weight: 900; line-height: 1.3; color: #fff; }
        .card-desc { font-size: 0.95rem; line-height: 1.6; color: rgba(255, 255, 255, 0.7); }
        .label-text { font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 900; color: #fff; margin-bottom: 0.8rem; letter-spacing: 0.15em; }

        .neon-border-card { background: rgba(255, 255, 255, 0.04); border-radius: 1.5rem; border: 1px solid rgba(255, 255, 255, 0.15); transition: 0.4s; }
        .input-dark { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.25); border-radius: 0.8rem; padding: 1rem; color: white; width: 100%; outline: none; }

        @media (max-width: 768px) {
            .logo-kr { font-size: 2.2rem; }
            .logo-en { font-size: 0.55rem; letter-spacing: 0.58em; padding-left: 0.1rem; }
            .card-title { font-size: 1.25rem; }
        }
    </style>
</head>
<body onload="initAll()">
    
    <!-- 네비게이션 -->
    <nav class="p-8 md:p-12 flex justify-between items-end max-w-[1600px] mx-auto">
        <!-- 비율 재조정된 로고 세트 -->
        <div class="logo-container cursor-pointer group" onclick="location.reload()">
            <h1 class="logo-kr text-gradient transition-transform group-hover:scale-[1.02]">가보자고.</h1>
            <span class="logo-en transition-colors group-hover:text-yellow-400">GABOJAGO</span>
        </div>
        <button class="bg-white text-black px-6 py-3 rounded-2xl font-black text-xs md:text-sm hover:bg-yellow-400 active:scale-95 transition-all mb-1">프리미엄 채널</button>
    </nav>

    <!-- 등록 섹션 -->
    <section class="max-w-[1600px] mx-auto px-8 md:px-12 py-4">
        <div class="neon-border-card p-8 md:p-14">
            <h2 class="text-2xl md:text-3xl font-black mb-10 italic text-gradient uppercase tracking-tighter">Project Submission</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                <div class="space-y-8">
                    <div>
                        <label class="label-text">PROJECT NAME</label>
                        <input type="text" id="reg-title" class="input-dark" placeholder="프로젝트 제목">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="label-text">CATEGORY</label>
                            <select id="selected-cat" class="input-dark bg-[#111]">
                                <option>01. 사이버 보안</option>
                                <option>02. 인공지능(AI)</option>
                                <option>03. 바이오 테크</option>
                                <option>04. 우주 통신</option>
                                <option>05. 로보틱스</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-text">IMAGE URL</label>
                            <input type="text" id="reg-img" class="input-dark" placeholder="https://" onfocus="if(this.value=='')this.value='https://'">
                        </div>
                    </div>
                </div>
                <div class="space-y-8">
                    <div>
                        <label class="label-text">DESCRIPTION</label>
                        <textarea id="reg-desc" class="input-dark h-[110px] md:h-[135px] resize-none" placeholder="상세 설명을 입력하세요"></textarea>
                    </div>
                    <button onclick="registerProject()" class="w-full py-5 bg-white text-black font-black text-xl rounded-2xl hover:bg-yellow-400 active:scale-95 transition-all">등록 확정</button>
                </div>
            </div>
        </div>
    </section>

    <!-- 그리드 리스트 -->
    <section class="max-w-[1600px] mx-auto px-8 md:px-12 py-12">
        <div id="project-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10"></div>
    </section>

    <!-- 모달 -->
    <div id="project-modal" class="hidden fixed inset-0 z-[1000] flex items-center justify-center p-4 bg-black/98 backdrop-blur-xl">
        <div class="neon-border-card w-full max-w-5xl bg-black relative overflow-hidden h-fit max-h-[90vh]">
            <button onclick="closeModal()" class="absolute top-6 right-8 text-4xl font-thin text-white/50 z-20 hover:text-white">&times;</button>
            <div id="modal-content" class="grid grid-cols-1 md:grid-cols-2 h-full">
                <div id="modal-img-container" class="h-full bg-center bg-cover min-h-[300px]"></div>
                <div class="p-10 md:p-16 flex flex-col justify-between pt-24">
                    <div>
                        <span id="modal-cat-tag" class="text-yellow-400 font-black text-xs tracking-widest mb-4 block"></span>
                        <h2 id="modal-title" class="card-title text-4xl md:text-5xl mb-6 italic text-gradient leading-tight"></h2>
                        <p id="modal-desc" class="text-lg text-white/70 leading-relaxed"></p>
                    </div>
                    <button onclick="requestMatch()" class="w-full mt-10 py-5 bg-white text-black font-black text-2xl rounded-2xl hover:bg-yellow-400">투자 매칭 신청</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let projects = [
            { id: 1, title: "국가 보안 퀀트 엔진", cat: "01. 사이버 보안", desc: "양자 암호화 기술 기반의 차세대 보안 시스템입니다.", img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=800&q=80" },
            { id: 2, title: "하이퍼 뉴럴 AI", cat: "02. 인공지능(AI)", desc: "스스로 학습하여 비즈니스 의사결정을 자동화하는 인공지능 솔루션입니다.", img: "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=800&q=80" }
        ];

        function initAll() { renderProjects(projects); }

        function renderProjects(data) {
            const grid = document.getElementById('project-grid');
            grid.innerHTML = data.map(p => `
                <div onclick="openModal(${p.id})" class="neon-border-card flex flex-col cursor-pointer group hover:scale-[1.02] transition-all overflow-hidden">
                    <div class="h-56 bg-cover bg-center" style="background-image: url('${p.img}')"></div>
                    <div class="p-8">
                        <span class="text-[11px] font-black text-yellow-400 mb-2 block">${p.cat}</span>
                        <h4 class="card-title mb-4 group-hover:text-yellow-400 transition-colors">${p.title}</h4>
                        <p class="card-desc line-clamp-2 italic font-medium">${p.desc}</p>
                    </div>
                </div>`).join('');
        }

        function openModal(id) {
            const p = projects.find(x => x.id === id);
            document.getElementById('modal-img-container').style.backgroundImage = `url('${p.img}')`;
            document.getElementById('modal-title').innerText = p.title;
            document.getElementById('modal-cat-tag').innerText = p.cat;
            document.getElementById('modal-desc').innerText = p.desc;
            document.getElementById('project-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }
        function closeModal() { document.getElementById('project-modal').classList.add('hidden'); document.body.style.overflow = 'auto'; }
        function registerProject() {
            const t = document.getElementById('reg-title').value;
            const c = document.getElementById('selected-cat').value;
            const d = document.getElementById('reg-desc').value;
            let i = document.getElementById('reg-img').value;
            if(!t || !d) return alert("내용을 입력해주세요.");
            if(i === "https://" || !i) i = "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=800&q=80";
            projects.unshift({ id: Date.now(), title: t, cat: c, desc: d, img: i });
            renderProjects(projects);
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 } });
        }
        function requestMatch() { alert('매칭 신청이 완료되었습니다.'); closeModal(); }
    </script>
</body>
</html>
