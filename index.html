<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가보자고 | 프리미엄 투자 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&family=Montserrat:wght@900&display=swap');
        :root { --primary-gold: #facc15; --bg-black: #000; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-black); color: #fff; margin: 0; -webkit-font-smoothing: antialiased; }
        
        /* 수정 1: 상단 안내 바 선명도 및 가독성 극대화 */
        .trial-bar { 
            background: var(--primary-gold); 
            padding: 14px 0; 
            text-align: center; 
            font-size: 15px; 
            font-weight: 900; 
            color: #000; 
            box-shadow: 0 4px 30px rgba(250, 204, 21, 0.4); 
            z-index: 100; 
            position: relative;
            letter-spacing: -0.02em;
        }

        .brand-kor { font-size: 2.6rem; font-weight: 900; color: #fff; letter-spacing: -0.05em; line-height: 0.9; }
        .brand-eng { font-family: 'Montserrat', sans-serif; font-size: 0.85rem; color: var(--primary-gold); letter-spacing: 0.38em; font-weight: 900; opacity: 0.8; margin-top: 6px; display: flex; justify-content: space-between; }
        
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px); border: 1px solid rgba(250, 204, 21, 0.12); transition: 0.3s; position: relative; }
        
        .blur-info { filter: blur(8px); opacity: 0.4; pointer-events: none; }
        .unlocked { filter: blur(0); opacity: 1; }
        .premium-lock { position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 10; border-radius: 2rem; border: 1px solid rgba(250, 204, 21, 0.2); }

        .btn-gold { background: var(--primary-gold); color: #000; font-weight: 900; border-radius: 12px; transition: 0.3s; cursor: pointer; }
        .btn-gold:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(250, 204, 21, 0.4); }
        
        #particle-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
    </style>
</head>
<body onload="initAll()">
    <canvas id="particle-canvas"></canvas>

    <div class="trial-bar">
        📢 현재 베이직 모드 이용 중 | 프리미엄 전환 시 모든 프로젝트의 상세 분석 리포트가 즉시 공개됩니다.
    </div>

    <nav class="p-8 flex justify-between items-center border-b border-white/5 sticky top-0 z-50 bg-black/90 backdrop-blur-md">
        <div class="brand-container flex flex-col">
            <span class="brand-kor">가보자고</span>
            <div class="brand-eng uppercase"><span>G</span><span>A</span><span>B</span><span>O</span><span>J</span><span>A</span><span>G</span><span>O</span></div>
        </div>
        <div class="flex items-center gap-8">
            <div class="text-right border-r border-white/10 pr-8">
                <p class="text-[13px] text-gray-400 font-black mb-1">나의 보유 자산</p>
                <p class="text-2xl font-black text-white italic"><span id="my-wallet" class="text-yellow-400">500,000,000</span> 원</p>
            </div>
            <div class="text-right border-r border-white/10 pr-8 hidden md:block">
                <p class="text-[12px] text-gray-500 font-black mb-1">회원 등급</p>
                <p id="user-rank" class="text-xl font-black text-white italic">일반 투자자</p>
            </div>
            <button id="pay-btn" onclick="openPayment()" class="btn-gold px-8 py-3 text-sm">VIP 멤버십 가입</button>
        </div>
    </nav>

    <main class="px-8 py-16 max-w-[1400px] mx-auto">
        <section class="mb-20 grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white/5 p-8 rounded-[2.5rem] border border-white/5">
                <p class="text-gray-500 text-[11px] font-black mb-2 uppercase tracking-widest">총 포트폴리오 가치</p>
                <h3 class="text-3xl font-black text-white italic">48,450,000,000 <span class="text-sm font-normal not-italic text-gray-600">원</span></h3>
            </div>
            <div class="bg-white/5 p-8 rounded-[2.5rem] border border-white/5 relative overflow-hidden">
                <p class="text-gray-500 text-[11px] font-black mb-2 uppercase tracking-widest">VIP 전용 예상 수익률</p>
                <h3 class="text-3xl font-black text-yellow-400 blur-info italic" id="main-yield">+24.8%</h3>
                <div id="yield-lock" class="absolute inset-0 bg-black/40 flex items-center justify-center">
                    <span class="text-[10px] font-black text-yellow-400 border border-yellow-400/30 px-3 py-1 rounded-full bg-black/60">VIP 전용 정보</span>
                </div>
            </div>
            <div class="bg-white/5 p-8 rounded-[2.5rem] border border-white/5">
                <p class="text-gray-500 text-[11px] font-black mb-2 uppercase tracking-widest">운용 중인 투자 엔진</p>
                <h3 class="text-3xl font-black text-white italic">12 <span class="text-sm font-normal not-italic text-gray-600">개 분야</span></h3>
            </div>
        </section>

        <div id="project-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </main>

    <script>
        // ... (기존과 동일한 스크립트 로직 생략, 하지만 한글화된 텍스트 포함)
        const projects = [
            { name: "사이버 보안 엔진", sub: "Security", fund: 4200000000, tag: "필수 자산", isPremium: false },
            { name: "인공지능 퀀트", sub: "AI Quant", fund: 7800000000, tag: "고수익군", isPremium: false },
            { name: "반도체 클러스터", sub: "Semi-Conductor", fund: 8900000000, tag: "프리미엄", isPremium: true },
            { name: "디지털 헬스케어", sub: "Bio Tech", fund: 5200000000, tag: "프리미엄", isPremium: true },
            { name: "우주 물류 시스템", sub: "Space X", fund: 3500000000, tag: "프리미엄", isPremium: true },
            { name: "차세대 2차 전지", sub: "Energy", fund: 3100000000, tag: "필수 자산", isPremium: false }
        ];

        function initAll() { renderProjects(); initParticles(); }
        function renderProjects() {
            const container = document.getElementById('project-container');
            container.innerHTML = projects.map((p, i) => `
                <div class="glass-card p-8 rounded-[2.5rem] overflow-hidden">
                    ${p.isPremium ? `
                    <div id="lock-${i}" class="premium-lock">
                        <button onclick="openPayment()" class="text-[10px] text-yellow-400 font-black border border-yellow-400/30 px-6 py-2 rounded-full bg-black/60 hover:bg-yellow-400 hover:text-black transition-all">분석 리포트 보기</button>
                    </div>` : ''}
                    <div id="info-${i}" class="${p.isPremium ? 'blur-info' : ''}">
                        <span class="px-2 py-1 bg-yellow-400/10 text-yellow-400 text-[9px] font-black rounded uppercase">${p.tag}</span>
                        <h4 class="text-xl font-black mt-4 mb-8 leading-tight">${p.name}<br><span class="text-white/20 font-light text-[10px] italic uppercase tracking-widest">${p.sub}</span></h4>
                        <div class="flex justify-between items-end">
                            <p class="text-sm font-black text-white">${p.fund.toLocaleString()} 원</p>
                            <button class="px-5 py-2 bg-white/5 border border-white/10 rounded-xl text-[10px] font-bold hover:bg-yellow-400 transition-all uppercase">거래하기</button>
                        </div>
                    </div>
                </div>`).join('');
        }
        function openPayment() { alert('결제 페이지를 불러옵니다.'); }
        function initParticles() {
            const canvas = document.getElementById('particle-canvas'); const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let p = Array.from({length: 40}, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, s: Math.random() * 1.5, v: Math.random() * 0.2 }));
            function draw() { ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = 'rgba(250,204,21,0.15)'; p.forEach(i => { i.y -= i.v; if(i.y < 0) i.y = canvas.height; ctx.beginPath(); ctx.arc(i.x, i.y, i.s, 0, Math.PI*2); ctx.fill(); }); requestAnimationFrame(draw); }
            draw();
        }
    </script>
</body>
</html>
