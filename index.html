<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GABOJAGO | 글로벌 실시간 투자 거래소</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;600;700&family=Montserrat:wght@800;900&display=swap');
        :root { --primary-gold: #facc15; --bg-black: #000; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-black); color: #fff; margin: 0; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        .hero-font { font-family: 'Montserrat', sans-serif; font-weight: 900; }
        .logo-group { display: flex; align-items: center; gap: 1.8rem; }
        .logo-symbol { background-color: var(--primary-gold); width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; border-radius: 14px; box-shadow: 0 0 25px rgba(250, 204, 21, 0.3); }
        .logo-symbol span { color: #000; font-size: 2rem; font-weight: 900; transform: skewX(-5deg); }
        .brand-name-eng { font-size: 2.1rem; letter-spacing: -0.05em; font-weight: 900; color: #fff; }
        .brand-name-kor { font-family: 'Noto Sans KR', sans-serif; font-size: 1.8rem; font-weight: 300; color: var(--primary-gold); margin-left: 0.8rem; letter-spacing: -0.05em; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px); border: 1px solid rgba(250, 204, 21, 0.12); transition: all 0.3s ease; }
        .glass-card:hover { transform: translateY(-8px); border-color: var(--primary-gold); background: rgba(255, 255, 255, 0.05); }
        .btn-invest-dual { display: flex; justify-content: center; align-items: center; gap: 1rem; width: 100%; padding: 1.2rem; background-color: #fff; color: #000; border-radius: 2rem; cursor: pointer; transition: 0.3s; }
        .btn-invest-dual:hover { background-color: var(--primary-gold); }
        #invest-modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.96); align-items: center; justify-content: center; backdrop-filter: blur(25px); }
        #invest-modal.active { display: flex; }
        .input-gold { background: transparent; border-bottom: 2px solid var(--primary-gold); width: 80%; color: white; font-size: 2.5rem; font-weight: 700; text-align: center; outline: none; padding: 1rem; }
        #particle-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
    </style>
</head>
<body onload="initAll()">
    <canvas id="particle-canvas"></canvas>

    <nav class="p-8 flex justify-between items-center border-b border-white/5 sticky top-0 z-50 bg-black/90 backdrop-blur-md">
        <div class="logo-group">
            <div class="logo-symbol"><span>G</span></div>
            <div class="flex items-baseline">
                <span class="brand-name-eng hero-font">GABOJAGO</span>
                <span class="brand-name-kor">가보자고</span>
            </div>
        </div>
        <div class="flex items-center gap-8">
            <div class="text-right pr-8 border-r border-white/10">
                <p class="text-[0.5rem] font-bold text-gray-500 uppercase tracking-widest">My Asset</p>
                <p class="text-xl font-black text-white italic"><span id="my-wallet">500,000,000</span>원</p>
            </div>
            <button class="bg-yellow-400 text-black px-6 py-2 rounded-xl font-black text-xs">RECHARGE</button>
        </div>
    </nav>

    <main class="px-8 py-20 max-w-[1600px] mx-auto">
        <div class="mb-16">
            <p class="text-yellow-400 font-bold tracking-[0.3em] text-xs uppercase mb-4">Capital Market Live</p>
            <h2 class="text-5xl font-bold italic tracking-tighter leading-tight">
                엔진 가동 시작: <br/> <span class="text-white opacity-80 font-light">가장 가치 있는 12대 핵심 자산에 투자하세요</span>
            </h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
            <div id="project-container" class="contents"></div>
        </div>
    </main>

    <div id="invest-modal">
        <div class="max-w-xl w-full p-10 text-center">
            <h2 id="modal-project-name" class="text-3xl font-black italic mb-10 text-yellow-400">PROJECT</h2>
            <input type="text" id="invest-input" class="input-gold" placeholder="0" oninput="formatInput(this)">
            <div class="flex gap-4 mt-12">
                <button onclick="closeInvestModal()" class="flex-1 py-5 bg-white/10 rounded-2xl text-gray-400">취소</button>
                <button onclick="processInvestment()" class="flex-[2] py-5 bg-yellow-400 text-black rounded-2xl font-black text-xl">투자 확정</button>
            </div>
        </div>
    </div>

    <script>
        let myBalance = 500000000;
        
        // 관심도 순 정렬 (시장 투자금 및 검색량 기준 시뮬레이션)
        const projects = [
            { name: "인공지능 퀀트 엔진", sub: "AI & Neural Networks", fund: 7800000000, tag: "Hottest" },
            { name: "반도체 클러스터", sub: "Next-Gen Semi-Conductor", fund: 8900000000, tag: "Essential" },
            { name: "사이버 보안 엔진", sub: "Global Cyber Security", fund: 4200000000, tag: "Top Security" },
            { name: "디지털 헬스케어", sub: "Bio-Tech & Healthcare", fund: 5200000000, tag: "Growth" },
            { name: "차세대 2차 전지", sub: "Energy Storage System", fund: 3100000000, tag: "Leading" },
            { name: "K-콘텐츠 & 엔터", sub: "Global K-Culture", fund: 2400000000, tag: "K-Trend" },
            { name: "우주 물류 시스템", sub: "Space Logistics", fund: 3500000000, tag: "Future" },
            { name: "양자 컴퓨터 허브", sub: "Quantum Computing", fund: 1450000000, tag: "Deep Tech" },
            { name: "자율주행 모빌리티", sub: "Smart Auto-Mobility", fund: 2800000000, tag: "Vision" },
            { name: "푸드테크 플랫폼", sub: "Smart Food Delivery", fund: 970000000, tag: "Platform" },
            { name: "수소 에너지 그리드", sub: "Hydrogen Green Energy", fund: 1500000000, tag: "ESG" },
            { name: "메타버스 인프라", sub: "Virtual Reality World", fund: 980000000, tag: "Web 3.0" }
        ];

        function initAll() { renderProjects(); initParticles(); updateWalletUI(); startLiveUpdates(); }
        function renderProjects() {
            const container = document.getElementById('project-container');
            container.innerHTML = projects.map((p, i) => `
                <div class="glass-card p-10 rounded-[3rem] ${i < 3 ? 'border-yellow-400/40' : ''}">
                    <div class="flex justify-between items-start mb-6">
                        <span class="px-3 py-1 ${i < 3 ? 'bg-yellow-400 text-black' : 'bg-yellow-400/10 text-yellow-400'} text-[10px] font-bold rounded-full uppercase border border-yellow-400/20">
                            ${p.tag}
                        </span>
                        <p class="text-right text-[0.6rem] text-gray-500 font-bold uppercase tracking-widest">Funded<br>
                        <span class="text-lg text-yellow-400 hero-font amt" data-val="${p.fund}">${p.fund.toLocaleString()}</span></p>
                    </div>
                    <h4 class="text-2xl font-bold italic uppercase mb-8">${p.sub}<br><span class="text-white/30 font-light text-lg">| ${p.name}</span></h4>
                    <div class="btn-invest-dual" onclick="openInvestModal('${p.name}')">
                        <span class="font-black text-sm hero-font">INVEST</span>
                        <span class="opacity-10">|</span>
                        <span class="text-sm font-medium">투자하기</span>
                    </div>
                </div>
            `).join('');
        }

        function updateWalletUI() { document.getElementById('my-wallet').innerText = myBalance.toLocaleString(); }
        function formatInput(el) {
            let val = el.value.replace(/[^0-9]/g, '');
            if (val === "") { el.value = ""; return; }
            el.value = Number(val).toLocaleString() + " 원";
        }
        function openInvestModal(name) {
            document.getElementById('modal-project-name').innerText = name;
            document.getElementById('invest-input').value = "10,000,000 원";
            document.getElementById('invest-modal').classList.add('active');
        }
        function closeInvestModal() { document.getElementById('invest-modal').classList.remove('active'); }
        function processInvestment() {
            const rawValue = document.getElementById('invest-input').value.replace(/[^-0-9]/g, '');
            const amount = parseInt(rawValue);
            if (amount > myBalance) { alert('잔액 부족'); return; }
            myBalance -= amount; updateWalletUI();
            alert(`${amount.toLocaleString()}원이 성공적으로 투자되었습니다.`);
            closeInvestModal();
        }
        function startLiveUpdates() {
            setInterval(() => {
                const amts = document.querySelectorAll('.amt');
                amts.forEach(el => {
                    let val = parseInt(el.getAttribute('data-val'));
                    val += Math.floor(Math.random() * 50000);
                    el.setAttribute('data-val', val); el.innerText = val.toLocaleString();
                });
            }, 3000);
        }
        function initParticles() {
            const canvas = document.getElementById('particle-canvas'); const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let p = Array.from({length: 45}, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, s: Math.random() * 1.5, v: Math.random() * 0.15 }));
            function draw() { ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = 'rgba(250,204,21,0.2)'; p.forEach(i => { i.y -= i.v; if(i.y < 0) i.y = canvas.height; ctx.beginPath(); ctx.arc(i.x, i.y, i.s, 0, Math.PI*2); ctx.fill(); }); requestAnimationFrame(draw); }
            draw();
        }
    </script>
</body>
</html>
