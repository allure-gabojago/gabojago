<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>가보자고 GABOJAGO | 로고 비율 최적화</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@900&family=Montserrat:wght@900&display=swap');
        
        :root { --primary-gold: #facc15; --bg-black: #010101; }
        body { background-color: var(--bg-black); color: #fff; margin: 0; font-family: 'Noto Sans KR', sans-serif; }

        /* [핵심] 로고 디자인: 한글 축소 + 영문 확대 */
        .brand-unit {
            display: inline-flex;
            flex-direction: column;
            align-items: center; /* 중앙 정렬 */
            text-align: center;
        }

        .text-gradient { 
            background: linear-gradient(to right, #facc15, #f472b6, #3b82f6); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        .logo-kr { 
            /* [수정] 한글 크기를 줄임 */
            font-size: 1.8rem; 
            font-weight: 900; 
            font-style: italic; 
            line-height: 1;
            letter-spacing: 0.1em; /* 한글은 자간을 살짝 벌려 여유를 줌 */
            display: block;
            margin-bottom: 8px;
            opacity: 0.9;
        }
        
        .logo-en { 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 900; 
            /* [수정] 영문 크기를 압도적으로 키움 */
            font-size: 3.5rem; 
            color: #ffffff;
            text-transform: uppercase;
            display: block;
            line-height: 0.9;
            letter-spacing: -0.02em; /* 영문은 오히려 자간을 좁혀 밀도감 상승 */
            transition: all 0.3s ease;
        }

        /* 하단 구분선 장식 */
        .logo-line {
            width: 100%;
            height: 3px;
            background: linear-gradient(to right, transparent, var(--primary-gold), transparent);
            margin-top: 10px;
        }

        /* 박스 디자인 강화 */
        .modern-card { 
            background: rgba(255, 255, 255, 0.03); 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            transition: 0.3s ease-in-out;
        }
        .modern-card:hover { border-color: var(--primary-gold); background: rgba(255, 255, 255, 0.07); }
        
        .input-dark {
            background: #0a0a0a; border: 1px solid #333; padding: 18px; border-radius: 12px;
            color: #fff; width: 100%; font-size: 1.1rem; outline: none; transition: 0.2s;
        }
        .input-dark:focus { border-color: var(--primary-gold); box-shadow: 0 0 15px rgba(250, 204, 21, 0.2); }

        .btn-main {
            background: #fff; color: #000; padding: 20px; border-radius: 15px;
            font-weight: 900; font-size: 1.4rem; transition: 0.3s;
        }
        .btn-main:hover { background: var(--primary-gold); transform: scale(1.02); }
    </style>
</head>
<body>
    
    <!-- 네비게이션: 새로운 비율의 로고 -->
    <nav class="p-12 max-w-[1400px] mx-auto flex flex-col items-center">
        <div class="brand-unit cursor-pointer group" onclick="location.reload()">
            <span class="logo-kr text-gradient">가보자고.</span>
            <h1 class="logo-en group-hover:text-yellow-400">GABOJAGO</h1>
            <div class="logo-line"></div>
        </div>
    </nav>

    <!-- 프로젝트 등록 섹션 -->
    <section class="max-w-[1200px] mx-auto px-6 py-10">
        <div class="modern-card p-10 md:p-16">
            <h2 class="text-2xl font-bold text-white/50 mb-10 tracking-[0.5em] uppercase text-center">Registration</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                <div class="space-y-8">
                    <div>
                        <p class="text-xs font-black text-yellow-400 mb-3 tracking-widest">PROJECT NAME</p>
                        <input type="text" class="input-dark" placeholder="프로젝트의 명칭">
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <p class="text-xs font-black text-yellow-400 mb-3 tracking-widest">CATEGORY</p>
                            <select class="input-dark"><option>AI Tech</option><option>Security</option></select>
                        </div>
                        <div>
                            <p class="text-xs font-black text-yellow-400 mb-3 tracking-widest">IMAGE</p>
                            <input type="text" class="input-dark" placeholder="URL">
                        </div>
                    </div>
                </div>
                <div class="space-y-8">
                    <div>
                        <p class="text-xs font-black text-yellow-400 mb-3 tracking-widest">SUMMARY</p>
                        <textarea class="input-dark h-[145px] resize-none" placeholder="간략한 설명"></textarea>
                    </div>
                    <button class="btn-main w-full">플랫폼 등록 확정</button>
                </div>
            </div>
        </div>
    </section>

    <!-- 간단한 푸터 정렬 안내 -->
    <footer class="text-center py-20 text-white/20 text-sm tracking-widest">
        &copy; 2026 GABOJAGO PLATFORM. ALL RIGHTS RESERVED.
    </footer>

</body>
</html>
