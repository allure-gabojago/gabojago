<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가보자고 | 실시간 매칭 엔진</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&family=Montserrat:wght@800&display=swap');
        :root { --primary-gold: #facc15; --bg-black: #050505; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-black); color: #fff; margin: 0; overflow-x: hidden; }
        
        /* 브랜드 로고 */
        .brand-group { display: flex; align-items: baseline; gap: 12px; }
        .brand-kor { font-size: 2.8rem; font-weight: 900; color: #fff; letter-spacing: -0.05em; }
        .brand-eng { font-family: 'Montserrat', sans-serif; font-size: 1.2rem; color: var(--primary-gold); letter-spacing: 0.1em; font-weight: 800; }
        
        .trial-bar { background: var(--primary-gold); padding: 12px 0; text-align: center; font-size: 15px; font-weight: 900; color: #000; }
        
        /* 상단 지표 */
        .stat-card { background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%); border: 1px solid rgba(255,255,255,0.1); border-radius: 4rem; padding: 3.5rem; text-align: center; }
        .stat-label { color: #888; font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; }
        .stat-value { font-size: 5rem; font-weight: 900; line-height: 1; }
        .stat-unit { font-size: 1.8rem; color: #555; margin-left: 0.5rem; font-weight: 700; }
        
        .btn-gold { background: var(--primary-gold); color: #000; font-weight: 900; border-radius: 12px; transition: 0.3s; cursor: pointer; }
        .btn-gold:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(250, 204, 21, 0.4); }
        
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; }
        .ranking-item { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 15px 0; }
    </style>
</head>
<body onload="initAll()">
    <div class="trial-bar">💎 실시간 알림: '안전 보안 사이버' 분야에 새로운 엔젤 투자자가 합류했습니다!</div>
    
    <nav class="p-8 flex justify-between items-center border-b border-white/5 sticky top-0 z-50 bg-black/90 backdrop-blur-md">
        <div class="brand-group cursor-pointer" onclick="showSection('main')">
            <span class="brand-kor">가보자고</span>
            <span class="brand-eng">GABOJAGO</span>
        </div>
        <div class="flex items-center gap-8">
            <button onclick="showSection('review')" class="text-white/60 hover:text-yellow-400 font-bold">심사 대시보드</button>
            <button onclick="openModal('portfolio-modal')" class="text-white/60 hover:text-white font-bold">포트폴리오 올리기</button>
            <button onclick="openModal('auth-modal')" class="btn-gold px-10 py-4 text-lg">무료로 시작하기</button>
        </div>
    </nav>

    <!-- 메인 섹션 -->
    <main id="main-section" class="px-8 py-16 max-w-[1600px] mx-auto">
        <section class="mb-20 grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="stat-card"><p class="stat-label">총 포트폴리오 가치</p><h3 class="stat-value">484<span class="stat-unit">억 원</span></h3></div>
            <div class="stat-card" style="border-color: rgba(250, 204, 21, 0.3);"><p class="stat-label" style="color: var(--primary-gold);">평균 수익률</p><h3 class="stat-value" style="color: var(--primary-gold);">24.8<span class="stat-unit" style="color: var(--primary-gold);">%</span></h3></div>
            <div class="stat-card"><p class="stat-label">운용 중인 투자 엔진</p><h3 class="stat-value">12<span class="stat-unit">개 업종</span></h3></div>
        </section>

        <div class="grid grid-cols-1 xl:grid-cols-4 gap-12">
            <!-- 실시간 수익률 랭킹 (신규) -->
            <div class="xl:col-span-1">
                <h3 class="text-2xl font-black mb-8 italic uppercase text-yellow-400">수익률 TOP 5</h3>
                <div class="glass-card p-6 rounded-[2rem]" id="ranking-list">
                    <!-- 랭킹 아이템이 스크립트로 들어갑니다 -->
                </div>
            </div>
            
            <!-- 업종 카드 리스트 -->
            <div class="xl:col-span-3 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="project-container"></div>
        </div>
    </main>

    <!-- 심사 섹션 -->
    <section id="review-section" class="hidden px-8 py-16 max-w-[1200px] mx-auto">
        <h2 class="text-4xl font-black mb-12 uppercase">투자 심사 대시보드</h2>
        <div class="glass-card p-10 rounded-[3.5rem] border-yellow-400/20">
            <div class="flex justify-between items-center mb-8 pb-8 border-b border-white/10">
                <div>
                    <h4 class="text-2xl font-black">사이버 보안 위협 탐지 AI</h4>
                    <p class="text-gray-500">제안자: 김개발 팀장</p>
                </div>
                <div class="text-right">
                    <p class="text-xs text-gray-500 mb-1 font-bold uppercase tracking-widest">Target Fund</p>
                    <p class="text-2xl font-black text-yellow-400">15.0억</p>
                </div>
            </div>
            <div class="flex gap-4">
                <button onclick="alert('문서를 불러오는 중입니다...')" class="flex-1 py-5 bg-white/5 rounded-2xl font-bold hover:bg-white/10 transition-all">백서 검토</button>
                <button onclick="triggerInvest()" class="flex-1 py-5 btn-gold text-xl">최종 투자 확정</button>
            </div>
        </div>
    </section>

    <script>
        const projects = [
            { name: "안전 보안 사이버", sub: "보안 및 네트워크 인프라", fund: "42억", dev: 24, angel: 8, tag: "인기 업종", yield: 32.5 },
            { name: "인공지능 퀀트", sub: "AI 모델링 및 알고리즘", fund: "78억", dev: 45, angel: 12, tag: "모집중", yield: 28.1 },
            { name: "반도체 클러스터", sub: "차세대 하드웨어 설계", fund: "89억", dev: 18, angel: 15, tag: "전략 분야", yield: 22.4 },
            { name: "디지털 헬스케어", sub: "바이오 및 원격 의료", fund: "52억", dev: 31, angel: 6, tag: "성장 중", yield: 19.8 }
        ];

        function initAll() {
            renderProjects();
            renderRanking();
        }

        function renderProjects() {
            const container = document.getElementById('project-container');
            container.innerHTML = projects.map(p => `
                <div class="glass-card p-8 rounded-[2.5rem] flex flex-col justify-between h-[360px]">
                    <div>
                        <div class="flex justify-between mb-4">
                            <span class="bg-yellow-400/10 text-yellow-400 px-2 py-1 rounded text-[10px] font-black uppercase">${p.tag}</span>
                            <span class="text-[11px] text-white/40">개발자 ${p.dev} · 투자자 ${p.angel}</span>
                        </div>
                        <h4 class="text-2xl font-black mb-2">${p.name}</h4>
                        <p class="text-white/30 text-xs mb-6">${p.sub}</p>
                    </div>
                    <div>
                        <p class="text-xl font-black mb-4 text-yellow-400">${p.fund} 운용 중</p>
                        <button onclick="showSection('review')" class="btn-gold w-full py-3 text-xs uppercase">심사 및 제안하기</button>
                    </div>
                </div>
            `).join('');
        }

        function renderRanking() {
            const list = document.getElementById('ranking-list');
            const sorted = [...projects].sort((a, b) => b.yield - a.yield);
            list.innerHTML = sorted.map((p, i) => `
                <div class="ranking-item flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <span class="text-lg font-black ${i<3 ? 'text-yellow-400' : 'text-gray-600'}">0${i+1}</span>
                        <span class="text-sm font-bold text-gray-300">${p.name}</span>
                    </div>
                    <span class="text-sm font-black text-white">+${p.yield}%</span>
                </div>
            `).join('');
        }

        function triggerInvest() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#facc15', '#ffffff', '#ffeb3b'] });
            setTimeout(() => { alert('축하합니다! 투자가 확정되어 계약 단계로 진입합니다.'); }, 500);
        }

        function showSection(section) {
            document.getElementById('main-section').classList.toggle('hidden', section !== 'main');
            document.getElementById('review-section').classList.toggle('hidden', section !== 'review');
            window.scrollTo(0,0);
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
    </script>
</body>
</html>
