<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가보자고 | 투자-개발 매칭 플랫폼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&family=Montserrat:wght@800&display=swap');
        :root { --primary-gold: #facc15; --bg-black: #050505; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-black); color: #fff; margin: 0; }
        
        /* 브랜드 로고 영역 */
        .brand-group { display: flex; align-items: baseline; gap: 12px; }
        .brand-kor { font-size: 2.8rem; font-weight: 900; color: #fff; letter-spacing: -0.05em; }
        .brand-eng { font-family: 'Montserrat', sans-serif; font-size: 1.2rem; color: var(--primary-gold); letter-spacing: 0.1em; font-weight: 800; opacity: 0.9; }
        
        .stat-card { 
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4rem;
            padding: 3.5rem;
            text-align: center;
        }
        .stat-label { color: #888; font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; }
        .stat-value { font-size: 5rem; font-weight: 900; line-height: 1; color: #fff; }
        .stat-unit { font-size: 1.8rem; color: #555; margin-left: 0.5rem; font-weight: 700; }
        
        .btn-gold { background: var(--primary-gold); color: #000; font-weight: 900; border-radius: 12px; transition: 0.3s; }
        .trial-bar { background: var(--primary-gold); padding: 12px 0; text-align: center; font-size: 15px; font-weight: 900; color: #000; }
    </style>
</head>
<body onload="initAll()">
    <div class="trial-bar">🚀 현재 모든 파트너 제안 기능을 무료로 이용 가능합니다.</div>
    
    <nav class="p-8 flex justify-between items-center border-b border-white/5 sticky top-0 z-50 bg-black/90 backdrop-blur-md">
        <!-- [수정완료] 가보자고 GABOJAGO 병기 -->
        <div class="brand-group cursor-pointer" onclick="location.reload()">
            <span class="brand-kor">가보자고</span>
            <span class="brand-eng">GABOJAGO</span>
        </div>
        <div class="flex items-center gap-8">
            <button onclick="showSection('review')" class="text-white/60 hover:text-yellow-400 font-bold">심사 대시보드</button>
            <button onclick="openModal('portfolio-modal')" class="text-white/60 hover:text-white font-bold">포트폴리오 올리기</button>
            <button onclick="openModal('auth-modal')" class="btn-gold px-10 py-4 text-lg">무료로 시작하기</button>
        </div>
    </nav>

    <main class="px-8 py-16 max-w-[1600px] mx-auto">
        <section class="mb-24 grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="stat-card">
                <p class="stat-label">총 포트폴리오 가치</p>
                <h3 class="stat-value">484<span class="stat-unit">억 원</span></h3>
            </div>
            <div class="stat-card" style="border-color: rgba(250, 204, 21, 0.3);">
                <p class="stat-label" style="color: var(--primary-gold);">평균 수익률</p>
                <h3 class="stat-value" style="color: var(--primary-gold);">24.8<span class="stat-unit" style="color: var(--primary-gold);">%</span></h3>
            </div>
            <div class="stat-card">
                <p class="stat-label">운용 중인 투자 엔진</p>
                <h3 class="stat-value">12<span class="stat-unit">개 업종</span></h3>
            </div>
        </section>

        <div id="project-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </main>

    <script>
        const projects = [
            { name: "안전 보안 사이버", sub: "보안 및 네트워크 인프라", fund: "42억", dev: 24, angel: 8, tag: "인기 업종" },
            { name: "인공지능 퀀트", sub: "AI 모델링 및 알고리즘", fund: "78억", dev: 45, angel: 12, tag: "모집중" },
            { name: "반도체 클러스터", sub: "차세대 하드웨어 설계", fund: "89억", dev: 18, angel: 15, tag: "전략 분야" },
            { name: "디지털 헬스케어", sub: "바이오 및 원격 의료", fund: "52억", dev: 31, angel: 6, tag: "성장 중" }
        ];

        function initAll() {
            const container = document.getElementById('project-container');
            container.innerHTML = projects.map(p => `
                <div class="glass-card p-8 bg-white/5 border border-white/10 rounded-[2.5rem] flex flex-col justify-between h-[360px]">
                    <div>
                        <div class="flex justify-between mb-4">
                            <span class="bg-yellow-400/10 text-yellow-400 px-2 py-1 rounded text-xs font-bold">${p.tag}</span>
                            <span class="text-[11px] text-white/40">개발자 ${p.dev} · 투자자 ${p.angel}</span>
                        </div>
                        <h4 class="text-2xl font-black mb-2">${p.name}</h4>
                        <p class="text-white/30 text-xs mb-6">${p.sub}</p>
                    </div>
                    <div>
                        <p class="text-xl font-black mb-4 text-yellow-400">${p.fund} 운용 중</p>
                        <div class="grid grid-cols-2 gap-2">
                            <button class="btn-gold py-3 text-xs">제안하기</button>
                            <button class="bg-white/5 py-3 rounded-xl text-xs font-bold">채팅하기</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
