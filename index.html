<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>가보자고 GABOJAGO | 로고 수평 정렬 완성</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@900&family=Montserrat:wght@900&display=swap');
        
        :root { --primary-gold: #facc15; --bg-black: #010101; }
        
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--bg-black); color: #fff; margin: 0; overflow-x: hidden;
        }

        /* [핵심] 가보자고 수평 정렬 로고 시스템 */
        .logo-box {
            display: inline-block;
            text-align: justify;
        }

        .text-gradient { 
            background: linear-gradient(to right, #facc15, #f472b6, #3b82f6); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        .logo-kr { 
            font-size: 4.5rem; /* 더 크게 키움 */
            font-weight: 900; 
            font-style: italic; 
            line-height: 0.8; /* 영문과 거의 붙도록 조정 */
            letter-spacing: -0.04em;
            display: block;
        }
        
        .logo-en { 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 900; 
            font-size: 1.15rem; /* 영문 크기 대폭 확대 */
            /* [강조] 한글 가~고. 의 좌우 너비에 딱 맞춘 자간 */
            letter-spacing: 0.72em; 
            color: #ffffff;
            text-transform: uppercase;
            display: block;
            margin-top: 0.3rem;
            padding-left: 0.2rem; /* 첫 글자 시작 위치 미세 조정 */
            border-top: 1px solid rgba(255,255,255,0.1); /* 미세한 구분선으로 정렬 강조 */
            padding-top: 0.4rem;
        }

        /* 박스 내부 텍스트 강화 */
        .card-title { font-size: 1.6rem; font-weight: 900; line-height: 1.3; color: #fff; }
        .card-desc { font-size: 1rem; line-height: 1.6; color: rgba(255, 255, 255, 0.75); }
        .label-text { font-family: 'Montserrat', sans-serif; font-size: 15px; font-weight: 900; color: #fff; margin-bottom: 0.8rem; letter-spacing: 0.15em; }

        .neon-border-card { background: rgba(255, 255, 255, 0.04); border-radius: 1.5rem; border: 1px solid rgba(255, 255, 255, 0.18); transition: 0.4s; }
        .input-dark { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.3); border-radius: 0.8rem; padding: 1.2rem; color: white; width: 100%; outline: none; font-size: 1.1rem; }

        @media (max-width: 768px) {
            .logo-kr { font-size: 2.8rem; }
            .logo-en { font-size: 0.7rem; letter-spacing: 0.7em; }
        }
    </style>
</head>
<body onload="initAll()">
    
    <!-- 네비게이션 -->
    <nav class="p-10 md:p-16 flex justify-between items-center max-w-[1600px] mx-auto">
        <!-- 수평 일치 로고 -->
        <div class="logo-box cursor-pointer group" onclick="location.reload()">
            <h1 class="logo-kr text-gradient transition-transform group-hover:scale-[1.03]">가보자고.</h1>
            <span class="logo-en transition-colors group-hover:text-yellow-400">GABOJAGO</span>
        </div>
        <button class="bg-white text-black px-8 py-4 rounded-2xl font-black text-sm md:text-base hover:bg-yellow-400 active:scale-95 transition-all shadow-[0_0_20px_rgba(255,255,255,0.1)]">프리미엄 채널</button>
    </nav>

    <!-- 등록 섹션 -->
    <section class="max-w-[1600px] mx-auto px-10 md:px-16 py-4">
        <div class="neon-border-card p-10 md:p-16">
            <h2 class="text-2xl md:text-4xl font-black mb-12 italic text-gradient uppercase tracking-tighter">Project Submission</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                <div class="space-y-10">
                    <div>
                        <label class="label-text">PROJECT NAME</label>
                        <input type="text" id="reg-title" class="input-dark" placeholder="프로젝트 제목">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="label-text">CATEGORY</label>
                            <select id="selected-cat" class="input-dark bg-[#111]">
                                <option>01. 사이버 보안</option>
                                <option>02. 인공지능(AI)</option>
                                <option>03. 바이오 테크</option>
                                <option>04. 우주 통신</option>
                                <option>05. 로보틱스</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-text">IMAGE URL</label>
                            <input type="text" id="reg-img" class="input-dark" placeholder="https://" onfocus="if(this.value=='')this.value='https://'">
                        </div>
                    </div>
                </div>
                <div class="space-y-10">
                    <div>
                        <label class="label-text">DESCRIPTION</label>
                        <textarea id="reg-desc" class="input-dark h-[130px] md:h-[160px] resize-none" placeholder="상세 설명을 입력하세요"></textarea>
                    </div>
                    <button onclick="registerProject()" class="w-full py-6 bg-white text-black font-black text-2xl rounded-2xl hover:bg-yellow-400 active:scale-95 transition-all shadow-2xl">플랫폼 등록 확정</button>
                </div>
            </div>
        </div>
    </section>

    <!-- 그리드 리스트 -->
    <section class="max-w-[1600px] mx-auto px-10 md:px-16 py-12">
        <div id="project-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-12"></div>
    </section>

    <!-- 모달 -->
    <div id="project-modal" class="hidden fixed inset-0 z-[1000] flex items-center justify-center p-4 bg-black/98 backdrop-blur-2xl">
        <div class="neon-border-card w-full max-w-6xl bg-black relative overflow-hidden h-fit max-h-[90vh]">
            <button onclick="closeModal()" class="absolute top-6 right-10 text-5xl font-thin text-white/50 z-20 hover:text-white">&times;</button>
            <div id="modal-content" class="grid grid-cols-1 md:grid-cols-2 h-full">
                <div id="modal-img-container" class="h-full bg-center bg-cover min-h-[400px]"></div>
                <div class="p-12 md:p-20 flex flex-col justify-between pt-28">
                    <div>
                        <span id="modal-cat-tag" class="text-yellow-400 font-black text-sm tracking-widest mb-6 block"></span>
                        <h2 id="modal-title" class="text-4xl md:text-6xl font-black mb-8 italic text-gradient leading-tight"></h2>
                        <p id="modal-desc" class="text-xl text-white/70 leading-relaxed font-medium"></p>
                    </div>
                    <button onclick="requestMatch()" class="w-full mt-12 py-6 bg-white text-black font-black text-2xl rounded-3xl hover:bg-yellow-400">투자 매칭 신청</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let projects = [
            { id: 1, title: "국가 보안 퀀트 엔진", cat: "01. 사이버 보안", desc: "양자 암호화 기술 기반의 차세대 보안 시스템입니다.", img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=800&q=80" },
            { id: 2, title: "하이퍼 뉴럴 AI", cat: "02. 인공지능(AI)", desc: "스스로 학습하여 비즈니스 의사결정을 자동화하는 솔루션입니다.", img: "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=800&q=80" }
        ];

        function initAll() { renderProjects(projects); }

        function renderProjects(data) {
            const grid = document.getElementById('project-grid');
            grid.innerHTML = data.map(p => `
                <div onclick="openModal(${p.id})" class="neon-border-card flex flex-col cursor-pointer group hover:scale-[1.02] transition-all overflow-hidden border-white/10 hover:border-white/40">
                    <div class="h-64 bg-cover bg-center" style="background-image: url('${p.img}')"></div>
                    <div class="p-10">
                        <span class="text-[12px] font-black text-yellow-400 mb-3 block tracking-tighter">${p.cat}</span>
                        <h4 class="card-title mb-5 group-hover:text-yellow-400 transition-colors">${p.title}</h4>
                        <p class="card-desc line-clamp-2 italic font-medium">${p.desc}</p>
                    </div>
                </div>`).join('');
        }

        function openModal(id) {
            const p = projects.find(x => x.id === id);
            document.getElementById('modal-img-container').style.backgroundImage = `url('${p.img}')`;
            document.getElementById('modal-title').innerText = p.title;
            document.getElementById('modal-cat-tag').innerText = p.cat;
            document.getElementById('modal-desc').innerText = p.desc;
            document.getElementById('project-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }
        function closeModal() { document.getElementById('project-modal').classList.add('hidden'); document.body.style.overflow = 'auto'; }
        function registerProject() {
            const t = document.getElementById('reg-title').value;
            const c = document.getElementById('selected-cat').value;
            const d = document.getElementById('reg-desc').value;
            let i = document.getElementById('reg-img').value;
            if(!t || !d) return alert("내용을 입력해주세요.");
            if(i === "https://" || !i) i = "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=800&q=80";
            projects.unshift({ id: Date.now(), title: t, cat: c, desc: d, img: i });
            renderProjects(projects);
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 } });
        }
        function requestMatch() { alert('매칭 신청이 완료되었습니다.'); closeModal(); }
    </script>
</body>
</html>
